body:
  text: 程氏經說卷五春秋春秋魯史記之名也夫子之道既不行於天下於是因魯春秋立百王不易之大法平王東遷在位五十一年卒不能復興先王之業王道絶矣孟子曰王者之跡熄而詩亡詩亡然後春秋作適當隱公之初故始於隱公隱公名息姑惠公子惠公元妃孟子繼室以聲子生隱公諡法不尸其位曰隱元年春王正月元年隱公之始年春天時正月王正書春王正月示人君當上奉天時下承王正明此義則知王與天同大人道立矣周正月非春也假天時以立義爾平王之時王道絶矣春秋假周以正王法隱不書即位明大法於始也諸侯之立必由王命隱公自立故不書即位不與其為君也法既立矣諸公或書或不書義各不同既不受命於天子以先君之命而繼世者則正其始文成襄昭哀是也繼世者既非王命又非先君之命不書即位不正其始也莊閔僖是也桓宣定之書即位桓弒君而立宣受弒賊之立定為逐君者所立皆無王無君何命之受故書其自即位也定之比宣則又有間矣三月公及邾儀父盟于蔑盟誓以結信出於人情先王所不禁也後世屢盟而不信則罪也諸侯交相盟誓亂世之事也凡盟內為主稱及外為主稱㑹在魯地雖外為主亦稱及彼來而及之也兩國已上則稱㑹彼盟而往㑹之也邾附庸國邾子克字儀父附庸之君稱字同王臣也夷狄則稱名降中國也夏五月鄭伯克段于鄢鄭武公娶于申曰武姜生莊公及共叔段愛段欲立之亟請於武公弗許及莊公即位請京使居之謂之京城大叔段失道而公弗制祭公諌而公弗聼故詩人譏其小不忍以致大亂也段完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期命子封伐京京叛段段入于鄢公伐諸鄢大叔出奔共書曰鄭伯克段于鄢鄭伯失為君之道無兄弟之義故稱伯而不言弟克勝也言勝段之彊使之彊所以致其惡也不書奔義不繫於奔也秋七月天王使宰咺來歸惠公仲子之賵王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也後世以智力把持天下者霸道也春秋因王命以正王法稱天王以奉天命夫婦人倫之本故當先正春秋之時嫡妾僣亂聖人尤謹其名分男女之配終身不變者也故無再配之禮大夫而下內無主則家道不立故不得已而有再娶之禮天子諸侯內職具備后夫人已可以攝治無再娶之禮春秋之始尚有疑焉故仲子羽數特降僖公而後無復辨矣春秋因其竊號而書之以志僣亂仲子繫惠公而言故正其名不曰夫人曰惠公仲子謂惠公仲子妾稱也以夫人禮賵人之妾不天亂倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王王臣雖微不名况於宰乎九月及宋人盟于宿惠公之季年敗宋師于黃公立而求成焉盟于宿魯志也稱及稱人皆非卿也冬十有二月祭伯來祭伯畿內諸侯為王卿士來朝魯不言朝不與朝也當時諸侯不修朝覲之禮失人臣之義王所當治也祭伯為王臣不能輔王正典刑而反與之交又來朝之故不與其朝以明其罪先儒有王臣無外交之說甚非也若天下有道諸侯順軌豈有由外之限其相交好乃常禮也然委官守而逺相朝無是道也周禮所謂世相朝謂鄰國爾公子益師卒諸侯之卿必受命於天子當時不復請命故諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也惟宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之義矣或日或不日因舊史也古之史記事簡略日月或不備春秋因舊史有可損而不能益也二年春公㑹戎于潜周室既衰蠻夷猾夏有散居中國者方伯大國明大義而攘斥之義也其餘列國慎固封守可也若與之和好以免侵暴非所謂戎狄是膺所以容其亂華也故春秋華夷之辨尤謹居其地而親中國與盟㑹者則與之公之㑹戎非義也夏五月莒人入向莒子娶于向向姜不安莒而歸莒人入向以姜氏還天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐舉兵以侵伐人其罪著矣春秋直書其事而責常在被侵伐者蓋彼加兵於己則當引咎或自辨喻之以禮義不得免焉則固其封疆告於天子方伯若忿而與戰則以與戰者為主處己絶亂之道也書莒人微者也凡將尊師衆曰某帥師將尊師少曰某伐某將卑師衆曰某師將卑師少曰某人不知衆寡將帥名氏亦曰某人書入入其國也侵人之境固為暴况入人之國乎無駭帥師入極古者卿皆受命於天子春秋之時諸侯自命也賜族者則書族不書族者未賜也賜族者皆命之世為卿也秋八月庚辰公及戎盟于唐戎猾夏而與之盟非義也九月紀履緰來逆女非命卿皆書名以君命來逆夫人也在魯故稱女內女嫁為諸侯夫人則書逆書歸明重事也來逆非卿則書歸而已見其禮之薄也先儒皆謂諸侯當親迎親迎者迎於所館故有親御授綏之禮豈有委宗廟社稷逺適他國以逆婦者乎非惟諸侯卿大夫而下皆然詩稱文王親迎于渭未嘗出疆也冬十月伯姬歸于紀送之者雖公子公孫非卿則不書紀子伯莒子盟于密闕文也當云紀侯某伯莒子盟于密左氏附㑹作帛杜預以為裂繻之字春秋無大夫在諸侯上者公羊穀梁皆作伯十有二月乙卯夫人子氏薨隱公夫人也薨上墜之聲諸侯國內稱之小君同婦人從夫者也公在故不書葬於此見夫婦之義矣鄭人伐衛聲其罪曰伐衛服故不戰衛服可免矣鄭之擅興戎王法所不容也三年春王二月己巳日有食之月王月也事在二月則書王二月在三月則書王三月無事則書時書首月蓋有事則道在事無事則存天時天時備則嵗功成王道存則人理立春秋之大義也日有食之有食之者也更不推求者何也太陽君也而被侵食君道所忌然有常度災而非異也星辰陵歷亦然三月庚戌天王崩崩上墜之形四海之內皆常奔赴魯君不往極惡罪大不可勝誅不書而自見也夏四月辛卯尹氏卒尹氏王之世卿古者使以德爵以功世祿而不世官是以俊傑在位庶績咸熙及周之衰士皆世官政由是敗尹氏世為王官故於其卒書曰尹氏見其世繼也秋武氏子來求賻武氏王之卿士稱武氏見其世官天王崩諸侯不供其喪故武氏遣其子徵求於四國書之以見天子失道諸侯不臣之甚也八月庚辰宋公和卒吉凶慶弔講好修睦鄰國之常禮人情所當然諸侯之卒與國之大故來告則書冬十有二月齊侯鄭伯盟于石門天下無王諸侯不守信義數相盟誓所以長亂也故外諸侯盟來告者則書之癸未葬宋穆公諸侯告喪魯往㑹葬則書春秋之時皆不請諡稱私諡所以罪其臣子四年春王二月莒人伐杞取牟婁諸侯土地有所受伐之其罪而奪取其土惡又甚焉王法所當誅也戊申衛州吁殺其君完衛莊公娶于齊曰莊姜無子陳女戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁石碏諌弗聽其子厚與州吁游禁之不可桓公立乃老州吁弒桓公而立自古篡弒多公族蓋謂先君子孫可以為君國人亦以為然而奉之春秋於此明大義以示萬世故春秋之初弒君者皆不稱公子公孫蓋身為大惡自絶於先君矣豈復得為先君子孫也古者公族刑死則無服况殺君乎大義既明於初矣其後弒立者則皆以屬稱或見其以親而寵之太過任之太重以至於亂或見其天屬之親而為寇讐立義各不同也春秋大率所書事同則辭同後人因謂之例然有事同而辭異者蓋各有義非可例拘也夏公及宋公遇于清諸侯相見而不行朝㑹之禮如道路之相遇故書曰遇非周禮冬見曰遇之遇也宋公陳侯蔡人衛人伐鄭宋以公子馮在鄭故與諸侯伐之也日摟諸侯以伐鄭固為罪矣而衛弒其君天下所當誅也乃與修好而同伐人其惡甚矣秋翬帥師㑹宋公陳侯蔡人衛人伐鄭宋虐用其民衛當誅之賊而與之同伐人其罪大矣二國構怨而他國與之同伐其罪均也再序四國重言其罪左氏以為再伐妄也翬不稱公子弒逆之人積其強惡非一朝一夕辨之宜早故去其公子隱公不能辨是以及禍九月衛人殺州吁于濮州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳侯方有寵於王若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰此二人者實弒寡君敢即圖之陳人執之而請涖於衛衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳稱衛人衆辭也舉國殺之也冬十有二月衛人立晉衛人逆公子晉于邢而立之書曰衛人立晉衛人立之也諸侯之立必受命於天子當時雖不受命於天子猶受命於先君衛人以晉公子也可以立故立之春秋所不與也雖先君子孫不由天子先君之命不可立也故去其公子五年春觀魚于棠諸侯非王事民事不逺出逺出觀魚非道也夏四月葬衛桓公衛亂是以緩稱桓公見國人私諡也魯往㑹故書送終大事也必就正寢不沒于婦人之手曽子易簀而沒豈苟然乎死而加之不正之諡知忠孝者肯為乎秋衛師入郕晉乘亂得立不思安國保民之道以尊王為先居喪為重乃興戎修怨入人之國書其失道也九月考仲子之宫初獻六羽諸侯無再娶仲子不得為夫人春秋之初尚以為疑故别宫以祀之考始成而祀也書以見非禮成王賜魯用天子禮樂祀周公後世遂羣廟皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僣也仲尼以魯之郊禘為周公之道衰用天子之禮祀周公成王之過也邾人鄭人伐宋宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道邾人鄭人伐宋先邾人為主也螟書螟書螽皆為災也國之大事故書冬十有二月宋人伐鄭圍長葛伐國而圍邑肆其暴也六年春鄭人來輸平魯與鄭舊修好既而迫於宋衛遂與之同伐鄭故鄭來絶交輸平變其平也匹夫且不肯失信於人為國君而負約可羞之甚也夏五月辛酉公㑹齊侯盟于艾始平于齊也秋七月無事書首月天時王月備而後成嵗也冬宋人取長葛宋之圍長葛嵗且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而不能保有赴訴卒喪其邑皆罪也宋之彊取不可勝誅矣七年春王三月叔姬歸于紀伯姬為紀夫人叔姬其娣也待年於家今始歸娣歸不書閔其無終也滕侯卒不名史闕也夏城中丘為民立君所以養之也養民之道在愛其力民力足則生養遂生養遂則教化行而風俗美故為政以民力為重也春秋凡用民力必書其所作興不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知慎重於用民力矣然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者興廢復古之大事為國之先務如是而用民力乃所當用也人君知此義則知為政之先後輕重矣凡書城者完舊也書築者創始也城中丘使民不以時非人君之用心也齊侯使其弟年來聘凡不稱公子而稱弟者或責失兄弟之義或罪其以弟之愛而寵任之過左氏公羊傳皆曰年齊僖公之母弟先儒母弟之說蓋緣禮文有立嫡子同母弟之說其曰同母弟蓋謂嫡爾非以同母為加親也若以同母為加親是不知人理近於禽道也天下不明斯義也久矣僖公愛年其子尚禮秩如嫡卒致篡弒之禍書弟見其以弟之愛而寵任之過也桓三年同秋公伐邾左氏傳為宋討也擅興甲兵為人而伐人非義之甚也冬天王使凡伯來聘周禮時聘以結諸侯之好諸侯不修臣職而聘之非王體也戎伐凡伯于楚丘以歸初戎朝于王發幣於公卿凡伯弗賔王使凡伯來聘戎伐之于楚丘以歸楚丘衛地伐見其以衆天子之使道由於衛而戎得以衆伐之衛不能衛其罪可知言以歸則非執凡伯有失節之罪八年春宋公衛侯遇于垂齊侯將平宋衛於鄭有㑹期宋公以幣請於衛請先相見故遇於垂宋忌鄭之深故與鄭卒不成好無諸侯相見之禮故書曰遇三月鄭伯使宛來歸祊魯有朝宿之邑在王畿之內曰許鄭有朝宿之邑近於魯曰祊時王政不修天子不巡守魯亦不朝故欲以祊易許各取其近者故使宛來歸祊歸魯來言易也朝宿之邑先祖受之於先王豈可相易也鄭來歸而魯受之其罪均也庚寅我入祊入者內弗受也義不可而彊入之也秋七月庚午宋公齊侯衛侯盟于瓦屋宋為主也盟與鄭絶也八月葬蔡宣公速也諸侯五月而葬不及期簡也九月辛卯公及莒人盟于浮來鄰國之交講信修睦可也安用盟為公屈己與臣盟義非安也螟為災也民以食為命故有災必書冬十有二月無駭卒未賜族書名而已九年春天王使南季來聘周禮大行人時聘以結諸侯之好王法之行時加聘問以懷撫諸侯乃常禮也春秋之時諸侯不修臣職朝覲之禮廢絶王法所當治也不能正典刑而反聘之又不見答失道甚矣三月癸酉大雨震電庚辰大雨雪隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傅其說而不逹其理故所言多妄三月大雨震電不時災也大雨雪非常為大亦災也夏城郎書不時也冬公㑹齊侯于防謀伐宋也十年春王二月公㑹齊侯鄭伯于中丘為師期也夏翬帥師㑹齊人鄭人伐宋三國先遣將致伐齊鄭稱人非卿也翬不稱公子與四年同六月壬戌公敗宋師于管不言戰而言敗敗者為主彼與戰而此敗之也辛未取郜辛巳取防取二邑而有之盜也秋宋人衛人入鄭鄭勞民以務外而不知守其國故二國入之宋人蔡人衛人伐戴鄭伯伐取之宋人衛人入鄭蔡人從之伐戴鄭伯圍戴克之取三師焉戴鄭所與也故三國伐之鄭戴合攻盡取三國之衆其殘民也甚矣冬十月壬午齊人鄭人入郕討不㑹伐宋也宋以公子馮在鄭故二國交惡左氏傳云宋公以王命討之於春秋不見其為王討也王臣不行王師不出矯假以逞私忿耳十有一年春滕侯薛侯來朝諸侯雖有相朝之禮而當時諸侯於天子未嘗朝覲獨相率以朝魯得為禮乎夏公㑹鄭伯于時來謀伐許也秋七月壬午公及齊侯鄭伯入許書及內為主非內為主則先書㑹伐後書入也冬十有一月壬辰公薨翬譛于桓公而請弒之公祭鍾巫館于寪氏翬使賊弒公于寪氏立桓公而討寪氏有死者人君終于路寢見卿大夫而終乃正終也薨于燕寢不正其終也薨不書地弒也賊不討不書葬無臣子也桓公名軌惠公子隱公弟桓王九年即位諡法闢土服逺曰桓元年春王正月公即位桓公弒君而立不天無王之極也而書春王正月公即位以天道王法正其罪也三月公㑹鄭伯于垂鄭伯以璧假許田隱公八年鄭伯使宛來歸祊蓋欲易許田魯受祊而未與許及桓弒立故為㑹而求之復加以璧朝宿之邑先祖受之於先王豈可相易也故諱之曰假諱國惡禮也夏四月丁未公及鄭伯盟于越桓公欲結鄭好以自安故既與許田又為盟也弒君之人凡民罔弗懟而鄭與之盟以定之其罪大矣秋大水君修德則和氣應而雨暘若桓行逆德而致隂沴乃其宜也二年春王正月戊申宋督弒其君與夷及其大夫孔父桓公無王而書王正月正宋督之罪也弒逆之罪不以王法正之天理滅矣督雖無王而天理未嘗亡也人臣死君難書及以著其節父名也稱大夫不失其官也滕子來朝滕本侯爵後服屬于楚故降稱子夷狄之也首朝桓公之罪自見矣三月公㑹齊侯陳侯鄭伯于稷以成宋亂宋弒其君而四國共成定之天下之大惡也夏四月取郜大鼎于宋戊申納于太廟四國既成宋亂而宋以鼎賂魯齊陳鄭皆有賂魯以為功而受之故書取以成亂之賂器置于周公之廟周公其饗之乎故書納納者弗受而强致也秋七月杞侯來朝凡杞稱侯者皆當為紀杞爵非侯文誤也及紀侯大去其國之後紀不復稱侯矣蔡侯鄭伯㑹于鄧始懼楚也九月入杞將卑師少外則稱人內則止云入某伐某公及戎盟于唐冬公至自唐君出而書至者有三告廟也過時也危之也桓公弒立嘗與鄭齊陳㑹矣皆同為不義及逺與戎盟故危之而書至戎若不如三國之黨惡則討之矣居夷浮海之意也中國既不知義夷狄或能知也三年春正月公㑹齊侯于嬴桓公弒君而立元年書王以王法正其罪也二年宋督弒君以王法正其罪也三年不書王見桓之無王也㑹齊侯于嬴成昏于齊也夏齊侯衛侯胥命于蒲二國為㑹約言相命而不為盟詛近於理也故善之六月公㑹杞侯于郕自桓公篡立無嵗不與諸侯盟㑹結外援以自固也秋七月壬辰朔日有食之既既盡也食盡為異大也公子翬如齊逆女翬於隱世不稱公子隱之賊也於桓世稱公子桓之黨也卿逆夫人於禮為稱翬雖尊屬當官而行亦無嫌也九月齊侯送姜氏于歡公㑹齊侯于歡齊侯出疆送女公逺㑹之皆非義也夫人姜氏至自齊見于廟也齊侯使其弟年來聘致夫人也稱弟義見隱七年有年書有年紀異也人事順於下則天氣和於上桓弒君而立逆天理亂人倫天地之氣為之繆戾水旱凶災乃其宜也今乃有年故書其異宣公為弒君者所立其惡有間故大有年則書之四年春正月公狩于郎公出動衆皆當書于郎逺也夏天王使宰渠伯糾來聘桓公弒君而立天子不能治天下莫能討而王使其宰聘之示加尊寵天理滅矣人道無矣書天王言當奉天也而其為如此名糾尊卑貴賤之義亡也人理既滅天運乖矣隂陽失序嵗功不能成矣故不具四時五年春正月甲戌下文闕夏齊侯鄭伯如紀齊侯鄭伯朝于紀欲以襲之紀人知之齊為諸侯而欲為賊於鄰國不道之甚鄭伯助之其罪均矣天王使仍叔之子來聘古之授任稱其才德故士無世官周衰官人以世故卿大夫之子代其父任事仍叔受命來聘而使其子代行也秋蔡人衛人陳人從王伐鄭王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗王師於諸侯不書敗諸侯不可敵王也於夷狄不書戰夷狄不能抗王也此理也其敵其抗王道之失也大雩成王尊周公故賜魯重祭得郊禘大雩大雩雩于上帝用盛樂也諸侯雩于境內之山川耳成王之賜魯公之受皆失道也故夫子曰魯之郊禘非禮也周公其衰矣大雩嵗之常祀不能皆書也故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書螽蝗也既旱又蝗饑不在書也冬州公如曹州公嘗為王三公故稱公不能保其國去如曹遂不復六年春正月實來五年冬如曹尚為君也故以諸侯書之今不能反國則匹夫也故名之來來魯也忽稱鄭忽明其正也實不稱州亡其國也夏四月公㑹紀侯于成謀齊難也秋八月壬午大閲為國之道武備不可廢必於農隙講肄保民守國之道也盛夏大閲妨農害人失政之甚無事而為之妄動也有警而為之教之不素何以保其國乎蔡人殺陳他他弒世子而竊位不能有其國故書曰陳他陳厲公蔡出也故蔡桓侯殺他而立之他天下之惡人皆得誅之蔡侯殺之實以私也故書蔡人見殺賊者衆人之公也九月丁卯子同生冢嫡之生國之大事故書冬紀侯來朝紀侯懼齊來朝以求助不能上訴於天子近赴於諸侯和輯其人民效死以守而欲求援於魯桓不能保其國宜矣七年春二月己亥焚咸丘古者昆蟲而後火田去莽翳以逐禽獸非竭山林而焚之也咸丘地名云焚咸丘如盡焚其地見其廣之甚也夏榖伯綏來朝鄧侯吾離來朝臣而弒君天理滅矣宜天下所不容也而反天子聘之諸侯相繼而朝之逆亂天道嵗功不能成矣故不書春冬與四年同曰然則十五年邾人牟人葛人來朝何以書秋冬曰四年與此明其義矣三國之來别立義也八年春正月己卯蒸冬蒸非過也書之以見五月又蒸為非禮之甚也天王使家父來聘魯桓公弒立未嘗朝覲而王屢聘之失道之甚也夏五月丁丑蒸正月既蒸矣而非時復蒸者必以前蒸為不備也其瀆亂甚矣冬十月雨雪建酉之月未霜而雪書異也祭公來遂逆王后于紀祭公受命逆后而至魯先行私禮故書來而以逆后為遂事責其不䖍王命而輕天下之母也九年春紀季姜歸于京師書王國之事不可用無王之月故書時而已或曰借如正月日食則如何書之曰書春日食則其義尤明也王后之歸天下當有其禮諸侯莫至是不能母天下也故書紀女歸而已冬曹伯使其世子射姑來朝曹伯有疾不能親行故使其世子來朝春秋之時君疾而使世子出取危亂之道也先生作春秋傳至此而終舊有解說者纂集附之於後十年冬齊侯衛侯鄭伯來戰于郎來戰于郎三國為主十有一年突歸于鄭突不稱公子不可以有國也鄭忽出奔衛忽國氏正也不能有其位故不爵十有四年鄭伯使其弟語來盟使來盟盟前定矣與髙子不同十有五年鄭伯突出奔蔡避祭仲而出非國人出之也鄭世子忽復歸于鄭稱世子本當立者不能保其位故不稱爵鄭人謂之狡童又曰狂童恣行其不肖可知秋九月鄭伯突入于櫟突非正也忽既恣行故國人君之諸侯助之書爵所以戒居正者已不能保則人取之矣書入以見義不容也十有六年夏四月公㑹宋公衛侯陳侯伐鄭突善結諸侯故皆為之致力屢伐鄭也秋七月公至自伐鄭不惟告廟又以見勤勞於鄭突也莊公名同桓公子莊王四年即位諡法勝敵克亂曰莊五年冬公㑹齊人宋人陳人蔡人伐衛諸國稱人違抗王命也貶諸侯則魯在其中矣六年春王正月王人子突救衛雖微稱字王人當尊也夏六月衛侯朔入于衛朔搆其兄而使至於死其罪大矣然父立之諸侯莫得而治也王治其舊惡而廢之宜也故書名書入九年八月庚申及齊師戰于乾時我師敗績及其師非卿也公戰諱敗凡言敗績大敗也小小勝負不書十年冬十月齊師滅談春秋之法將尊師衆曰某帥師將卑師衆曰某師將卑師少曰人將尊師少曰某伐某齊自管仲為政莊十一年而後未嘗興大衆也其賦於諸侯亦寡矣終管仲之身四十年息養天下厚矣惟救邢稱師譏其次也至於秦晉使之不竟而已不强致也是以其功卑而易成十有六年冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽齊桓始霸仗義以盟而魯叛盟故諱不稱公上無明王下無方伯諸侯交爭齊桓始霸天下與之故書同十有九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟鄄之巨室嫁女於陳人結以其庶女媵之因與齊宋盟挈之以往結好大國所以安國息民乃以私事之小而取怒大國故深罪之書其為媵而往盟為遂事冬齊人宋人陳人伐我兩鄙齊桓始霸責魯不恭其事故來伐也二十有二年秋七月丙申及齊髙傒盟于防髙傒上卿魯無使微者與盟之理蓋諱公盟始與仇為昏惡之大也冬公如齊納幣齊疑昏議故公自行納幣後二年方逆齊難之也二十有三年夏公如齊觀社昏議尚疑故公以觀社為名再往請議後二年方逆蓋齊難之十有二月甲寅公㑹齊侯盟于扈遇榖盟扈皆為要結姻好二十有七年夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽同志而盟非率之也三十有一年冬不雨一嵗三築臺明年春城小穀故冬書不雨閔之深也閔公名啓方莊公子惠王十六年即位諡法在國逢難曰閔二年冬齊髙子來盟髙子來省難然後盟盟未前定也稱髙子善其能恤魯僖公名申莊公子閔公庶兄惠王十八年即位諡法小心畏忌曰僖元年春王正月齊師宋師曹師次于聶北救邢齊未嘗興大衆此稱師責其衆可救而徒次以為聲援致邢之不保其國也二年虞師晉師滅下陽虞假道而助晉伐虢虢之亡虞實致之故以虞為主下陽邑也虢之立由此故即書滅四年秋及江人黃人伐陳齊命也五年公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止世子王之二不可與諸侯列世子出諸侯㑹之故其辭異冬晉人執虞公書執而不書滅自取也九年夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于蔡丘天子之宰與世子禮異九月戊辰諸侯盟于葵丘云諸侯盟見宰不預十有七年夏滅項滅人之國罪惡大矣在君則當諱故魯滅國書取滅項君在㑹季孫所為也故不諱十有八年五月戊寅宋師及齊師戰于甗齊師敗績書宋及曲在宋也奉少以奪長其罪大矣齊師敗績書敗責齊臣也二十有一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于孟執宋公以伐宋宋率諸侯為㑹而蠻夷執㑹主而諸侯莫違故以同執書之二十有二年秋八月丁未及邾人戰于升陘公戰也二十有三年冬十有一月杞子卒杞二王後而伯爵疑前世黜之也中間從夷故子之後復稱伯二十有七年冬楚人陳侯蔡侯鄭伯許男圍宋楚稱人貶之為其合諸侯以圍宋也二十有九年夏㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉晉文連年㑹盟皆在王畿之側而此盟復迫王城又與王人盟强迫甚矣故諱公諸侯貶稱人惡之大也三十有三年夏四月辛巳晉人及姜戎敗秦師于殽晉不稱君居喪祔葬不可從戎也忘親背惠其惡甚矣秦為無道越晉踰周以襲人衆所共憤故稱晉人其稱及姜戎亦然文公名興僖公子襄王二十六年即位諡法慈惠愛民曰文二年春王正月甲子晉侯及秦師戰于彭衙秦師敗績越國襲人秦罪也忘親背惠晉惡也秦經人之國以襲人雖憤無以為辭矣故其來不稱伐晉不諭秦而與戰故書晉及忿以取敗故書敗績冬晉人宋人陳人鄭人伐秦秦以憤取敗晉可以已矣而復伐秦報復無已殘民結怨故貶稱人三年秦人伐晉構怨連禍殘民以逞晉人畏之而不敢出秦人極其忿而後悔過聖人取其能終改耳四年夏逆婦姜于齊納幣在喪中與喪昏同也稱婦姜已成婦也不稱夫人不可為小君奉宗廟也不書逆者雖卿亦失其職矣晉侯伐秦秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其遷善悔過乃其善也冬十有一月壬寅夫人風氏薨自成風已後妾母稱夫人嫡妾亂矣仲子始僣尚未敢同嫡也五年春王正月王使榮叔歸含且賵天子成妾母為夫人亂倫之甚失天理矣不稱天義已明稱叔存禮也王使召伯來㑹葬天子以妾母同嫡亂天理故不稱天聖人於此尤謹其戒七年夏四月戊子晉人及秦人戰于令狐晉始逆立公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯已而擊之故書晉及秋八月公㑹諸侯晉大夫盟于扈文公怠政事多廢緩既納晉盟而復後至故書往㑹而隱其不及不序諸侯以見其不在故明年公子遂再往與晉盟也九年春毛伯來求金家父致命以徵車也故書使來求毛伯風魯以欲金故不云王使冬秦人來歸僖公成風之禭過時始至故云來歸雖子母先君後夫人體當然也書秦人不云君使以失禮夷之也言其尚夷也蓋嫡妾之亂自兹而始十年夏秦伐晉晉舍嫡嗣而外求君罪也既而悔之正也秦不顧義理之是非惟以報復為事夷狄之道也故夷之十有二年冬十有二月戊午晉人秦人戰于河曲凡戰皆以主人及客秦曲故不云晉及十有四年夏六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城諸侯始㑹議合而後盟盟者志同故書同同懼楚也十有五年冬十有一月諸侯盟于扈魯以備齊不在㑹故不序又稱諸侯者衆辭見衆國無能為也此盟為齊亂也十有七年春晉人衛人陳人鄭人伐宋行天討而成其亂失天職也故不卿之宣公名倭文公子子亦庶兄匡王五年即位諡法善問周達曰宣元年春王正月遂以夫人婦姜至自齊脫氏字夏六月齊人取濟西田宣公不義得國賂齊以求助齊受之以助不義故書取不義不能保其土故不云我非謂彼彊取故不諱不能有而失者皆諱十年齊人歸我濟西田魯修好故歸魯田田魯有也齊非義取之故云歸我不足為善也十有一年冬十月楚人殺陳夏徴舒人衆辭大惡衆所欲誅也丁亥楚子入陳誅其罪義也取其國惡也入者不受而彊之也納公孫寧儀行父于陳致亂之臣國所不容也故書納十有二年冬晉人宋人衛人曹人同盟于清丘晉為楚敗諸侯懼而同盟既而皆渝故書人以貶之宋伐陳衛救之楚伐宋晉不救十有七年夏六月己未公㑹晉侯衛侯曹伯邾子同盟于斷道諸國同心欲伐齊故書同盟成公名黑肱宣公子定王十七年即位諡法安民立政曰成二年冬十有一月丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀楚為强盛凌轢中國諸侯苟能保固彊圉要結鄰好豈有不能自存之理乃懼而服從與之約盟故皆稱人以見其衰弱責諸侯則魯可知矣三年冬鄭伐許鄭附於楚一年而再伐許故夷之四年冬鄭伯伐許稱鄭伯見其不復為喪以吉禮從戎五年冬十有二月乙丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢天王崩而㑹盟不廢書同見其皆不臣七年秋八月戊辰同盟于馬陵諸侯同心病楚八年冬衛人來媵媵小事不書伯姬之嫁諸侯皆來媵之故書以見其賢女子之賢尚聞於諸侯况君子乎或曰魯女之賢豈能聞於逺乎曰古者庶女與非敵者則求為媵因為之擇賢小君則諸侯國之賢女當自聞也九年公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲諸侯患楚之彊同盟以相保鄭既盟復叛深罪其反覆夏季孫行父如宋致女女既嫁父母使人安之謂之致女古者三月而廟見始成婦也伯姬賢魯國重之使卿致也十有三年春晉侯使郤錡來乞師不以王命興諸侯師故書乞三月公如京師不書朝王因㑹伐而行也故不成其朝夏五月公至自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦以伐秦為遂事明朝為重十有五年三月癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚十三年曹伯卒于師負芻殺世子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同矣宋殺其大夫山去族害公族也冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離吳益强大求㑹于諸侯諸侯之衆往而從之故書諸國往與之㑹以見夷狄盛而中國衰也時中國病楚故與吳親一本此下云襄十年柤之㑹與此同十四年向之㑹亦同十有六年六月晉侯使欒黶來乞師時以穆姜叔孫僑如將作難故師出後期秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公晉侯怒公後期故不見公君子正已而無恤乎人魯之後期國難故也晉不見為非矣彼曲我直故不足為恥也曹伯歸自京師曹伯不名不稱復歸王未嘗絶其位也自京師王命也九月晉人執季孫行父舍之于苕丘置之于苕丘也十有七年六月乙酉同盟于柯陵諸侯同病楚也襄公名午成公子簡王十四年即位諡法因事有功曰襄二年冬遂成虎牢設險所以守國也有虎牢之險而不能守故不繫于鄭責其不能守也三年六月乙未同盟于雞澤楚彊諸侯皆畏之而修盟故書同五月秋公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚吳來㑹非為主十年冬盜殺鄭公子騑公子發公孫輒盜殺三卿不稱大夫失卿職也十有一年秋七月乙未同盟于毫城北鄭服而同盟也隨復從楚伐宋云同見其反覆㑹于蕭魚諸侯數月之間再伐鄭鄭之反復可知鄭又服而請㑹不書鄭㑹謂其不可信也而晉悼公推至誠以待人信之不疑至哉誠之能感人也自此鄭不背晉者二十四年公至自㑹兵不加鄭故書自㑹十有八年冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊書同圍見諸侯之惡齊二十有五年秋八月己巳諸侯同盟于重丘諸侯同病楚也三十年冬十月晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故左傳叔孫豹㑹趙武而下諸國之卿既貶魯卿諱而不書三十有一年冬十有一月莒人弒其君密州莒子虐國人弒之而立展輿展輿非親弒也故書國人昭公名稠襄公子景王四年即位諡法容儀恭明曰昭元年三月取鄆乘莒之亂而取之故隱避其辭秋莒去疾自齊入于莒去疾假齊之力以入莒討展輿之罪正也故稱莒遂自立無所禀命故不稱公子自以為公子可立也莒展輿出奔吳為弒君者所立而以國氏者罪諸侯也虢之㑹雖國亂未預然諸侯與其立矣故欲執叔孫也稱莒展輿見諸侯之與其立也四年夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申晉平公不在諸侯楚於是强為霸者之事十有二年冬晉伐鮮虞晉假道於鮮虞而遂伐之見利忘義夷狄之道也十有三年秋八月甲戌同盟于平丘楚弃疾立諸侯懼之故同盟公不與盟晉不使與盟雖欲辱公然得不與同盟之罪實為幸也十有九年冬葬許悼公蔡般許止疑同故書葬定公名宋襄公子昭公弟敬王十一年即位諡法安民大慮曰定三年春王正月公如晉至河乃復季孫意如上不請於天子下不告於方伯而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟于臯鼬四年三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚楚恃其强侵陵諸侯晉上請於天子大合諸侯以伐之而不能明暴其罪以行天討無功而還故書侵以罪之五月公及諸侯盟于臯鼬公以不獲見於晉故因㑹而求盟焉則此盟公意也故書公及十年齊人來歸鄆歡龜田齊服義而求歸之故書來歸始失不書解在哀公八年哀公名蔣定公子敬王二十六年即位諡法恭仁短折曰哀六年齊陽生入于齊稱齊陽生見景公廢長立少以啓亂也八年夏齊人取歡及闡內失邑不書君辱當諱也不能保其土地民人是不君也已與之彼以非義而受則書取此濟西田是也魯入邾而以其君來致齊怒吳伐彼故賂齊以說之齊人歸歡及闡不云我田既歸邾子亦歸其田非以為惠也程氏經說卷五
