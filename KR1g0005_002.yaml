body:
  text: 程氏經說卷二書解孔序伏羲神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也又曰孔子討論墳典斷自唐虞以下以二典之言簡邃如此其上可知所謂大道雖性與天道之說固聖人所不可得而去也如言隂陽四時七政五行之道亦必至之要語非後代之繁衍末術也固亦常道聖人所不去也使誠有所謂羲農之書乃後世稱述當時之事失其義理如許行所謂神農之言及隂陽醫方稱黃帝之說耳此聖人所以去之也或疑隂符之類是甚非也此出戰國權變之術竊窺機要以為變詐之用豈上古至淳之道邪又五典既皆常道去其三何也蓋古雖已有文字而制立法度為治有迹得以紀載有史官之職以志其事自堯始其八卦之說謂之八索前世說易之書也易本八卦故以八名夫子贊易道以黜去是書所謂加我數年五十以學易可以無大過矣舊書之過可見也芟夷繁亂翦截浮辭舉其宏綱撮其機要人或疑前代之書聖人必無所刪改此亦不然若上古聖人之世史官固當其人其辭必盡善若後世之史未必盡當其辭未必盡善設如其書足以垂範不可去之而其或有害義聖人不得不有芟除更易也其不可更易者其事耳未必須曽刪改但辭苟有害有可刪改之理耳或疑血流漂杵之辭何不改此乃非害義理之辭也堯典為虞書蓋虞史所修舜典已下皆當為夏書故左氏傳引大禹臯陶謨益稷等皆謂之夏書也若以其虞時事當為虞書則堯典當為唐書也大抵皆是後世史所修典典則也上古時淳朴因時為治未立法度典制至堯而始著治迹立政有綱制事有法故其治可紀所以有書而稱典也揚子曰法始乎伏羲成乎堯蓋伏羲始畫卦造書契開其端矣至堯而與世立則著其典常成其治道故云成也書序夫子所為逐篇序其作之之意也昔在帝堯聰明文思光宅天下將遜於位讓于虞舜作堯典昔在文連下文光宅天下己下若與上文相連則文勢當云在昔也聽廣曰聰視遠曰明堯之神智所知所照洞徹無不流通故謂之聰明文文章也謂倫理明順成文也思謀慮意思也謂其含蓄言堯之神智聰明而其動作施為有條理文章其發謀措事意思深遠以此聰明文思臨治天下故其道光顯故云光宅光顯居天下也既老而將遜避帝位因禪讓於虞舜故史官作此堯典之書以載其事此夫子之序舉一篇所紀之大要也堯典此題書之目也曰若稽古帝堯史氏追紀前世之事若考古之帝堯其事云放勳以下是也堯典字為題下加曰者謂堯典之辭曰也若發語辭如書中王若曰之類也古史之體如此下若稽古帝舜大禹臯陶皆謂考古之某人其事如此也曰放勳功迹之著也放依也上古淳䃼隨事為治未立法度至堯始明治道因事立法著為典常其施政制事皆依循法則著見功迹可為典常也不惟聖人隨事之宜亦憂患後世而有作也放勳上更加曰字者稽古之帝堯其事曰如此也古史之體發論之辭也前儒見云放勳遂以為堯之名因而又以重華文命為舜禹之名若以其文同則亦當以允迪為臯陶之名而獨不謂之名者故或稱堯或稱放勳互稱之如孟子曰堯事而傳録誤作放勳亦如傳記中言仲尼或作夫子或作孔子之類但舉其人耳誤不足怪也欽明文思安安以此四德行放勳之事欽敬慎明聰明文文章思謀慮有此四者故其所為能得義理之至當上安其所處也下安得其理也謂其所為放勳之事皆安於義理之安王介甫云理之所可安者聖人安而行之序言堯德故云聰明文思此言其立事故云欽明文思施各有所宜也立事則欽慎為大舉德則聰明為先各因其宜單言明則包聰允恭克讓光被四表格於上下既言其有欽明文思之德故所以能立事成勳安於義理之安又言其允恭克讓所以光被四表格於上下允當也前儒訓信信然乃當也其實一義恭謂欽慎克能也禹曰朕德罔克是也讓謂謙讓不有其功之謂也言堯其所為至當而能欽慎其才至能而不自有其能夫常人之情自處既當則無所顧慮有能則自居其功惟聖人至公無我故雖功髙天下而不自有無所纍於心蓋一介存於心乃私心也則有矜滿之氣矣故舜稱禹功能天下莫與爭而不矜伐乃聖人之心也故堯舜允而恭克而讓夫雖允雖克足以立事成功而已未足以光被四表而格上下也必事當於彼而欽慎於此能髙於己而讓弗自有此天下所以感悅信服也孟子曰以善服人者未有能服人者也聖人與常人異人知允當不可矜也則為恭巽知能之不可眩也則是謙讓必悅而誠服也然作為於中而假之於外欲常其德且難矣况足以感人乎孟子曰不誠未有能動者也聖人之公心如天地之造化生養萬物而孰尸其功故應物而允於彼復何存於此也故不害欽慎之神能亦由乎理而已故無居有之私天下見其至當而恭能髙而讓所以中心悅而誠服也蓋一出於公誠而己惟其志至誠故能光顯及於四遠先儒訓光作充光輝照耀乃充塞也其實一義天下咸服其德則是其德充塞至於天地也克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎明於變時雍前言堯之德此言堯之治其事有次序始於明俊德俊德俊賢之德也堯能辨明而擇任之也帝王之道也以擇任賢俊為本得人而後與之同治天下天下之治由身及家而治故始於以睦九族也注云或疑親睦九族豈待任俊德乎蓋言得賢俊而為治治之始自睦九族為先故以次序言之也以王者親睦九族之道豈不賴賢俊之謀乎九族既己親睦以至於平治章明百姓庶民也前云明俊德既明而用之則任之之道包在其中矣故便及庶民王國百姓既已昭明倫理而順治矣則至於四方萬國皆協同和從天下黎庶於是變惡從善化成善俗而時雍乃命羲和欽若昊天厯象日月星辰敬授人時前言堯之治始於明俊德而後由睦九族以至和萬邦變時雍此復言其立政綱紀分正百官之職以成庶績而事之最大最先在推測天道明厯象欽若時令以授人也天下萬事無不本於此故最先詳載其事聖人治天下之道惟此二端而已治身齊家以至平天下者治之道也建立治綱分正百職順天時以制事至於創制立度盡天下之事者治之法也作典者述堯之治盡於此矣自堯曰疇咨已下皆紀其事以明堯之聖耳自上古之時固已迎日推䇿矣堯復考星以正四時其法明而易凖乃命羲和使敬順天時厯以象日月星辰之行次疏云遞中之星日月所㑹之辰定四時節候以班隨時之政授人時也又分命羲和二氏仲叔各主一時分命羲仲居東方之官主春時之政嵎夷東方之名東方陽之所生出歲所起也故云暘谷主敬導出日之政猶春氣之生舉歲首之事平均次序東作耕播之事又察晝夜之中鳥宿之見以正仲春之候使無差天時當是時民析散處田野耕作鳥獸則交接孕育上方察正其時舉其時政又言民物皆隨天時而然也羲氏主二時又重命羲叔居南方之官主夏時之政教孔云訛化也釋文言平序南方化育之事凡順夏時所施政教也厥民因謂春時播種在田民因就居於野收斂而後耕播也寅餞納日西日入之方秋收成之時敬隨時變終歲之事夷平也秋稼將熟歲功將畢民獲卒歲之食心力平夷安舒也毨澤好也北方曰朔方者朔初也陽生於子謂陽初始生之方也幽都幽隂之處也上云朔方止言北方也故須復云曰幽都居北方之官主順隆隂之候布冬時之政也平均也在察也平察終卒而反始所當更易之事也冬一歲之事既終則平察改歲當更之事也既成今歲之終又慮來歲之始如彼北方終其隂而復始其陽故云朔易或以為朔初也平在其來歲初始變易之事耳如此則不能包見其冬今歲之初也或又以為來歲更易之事自是春官所職此亦不然古者功作之事皆於冬月閒隙之際如修完室廬墻垣之類非今歲之用皆為來歲計耳皆是一歲之事既終則復慮其始也若畜種實修耒耜備器用不可俟來春農事既興而春官遽為之也咨釋詁云嗟也告與語之辭以閏月定四時成歲其法至堯而精密詳具故舉其法以敕羲和使職之古之時分職主察天運以正四時遂居其方之官主其時之政在堯謂之四嶽於周乃卿之任統天下之治者也後世學其法者不知其道故以星厯為工技之事而與政分矣允釐百工庶績咸熙自乃命羲和以下言堯設官分職立正綱紀以成天下之務首舉其大者是察天道正四時順時行政使人遂其生養之道此大本也萬事無不本於此天下之事無不順天時法隂陽者律度量衡皆出於此故首舉而詳載之其他庶事無不備言故統云允釐百工言百工之職各分命之也各授其任使行其治是信使治也允釐信治也百工各信治其職故庶工皆和史載堯治天下之治盡於此矣庶績咸熙治之成也自放勳至格于上下堯之德也自克明俊德至於變時雍堯治天下之道也自乃命羲和至庶績咸熙堯立治之法也自帝曰疇咨已下至篇終堯之聖明能知人也帝曰疇咨若時登庸咨嗟告與語之發辭問誰乎能順於是者將登庸之順是謂順我之治也辭不與前相連此堯老將遜帝位博求賢聖之意故放齊對以𦙍子朱啓明朱本不害故云明發而明通矣又訪問誰能若順我事此又别一時求人之事也方鳩僝功言方集其功靜言庸違王介甫云靜則能言用則違其言象恭滔天言其外貌恭而中心懷藏姦僞滔天莫測蕩蕩乎平漫之狀懷山襄陵故蕩蕩然也吁疑歎之辭方不順也命正理也謂其不循順正理而毁圮族類傾陷忌克之人也汝能庸命遜朕位汝能用命由正理也其順行帝位之事明明揚側陋使顯揚側陋之賢四嶽堯之輔臣固賢者也堯將禪帝位固宜先四嶽不能當復使之明揚在下之可當者宜其得聖人也後世多疑以為嶽可授則盍授之不可授則何命之也夫將以天下之公器授人堯其宜獨為之乎故先命之大臣百官以至天下有聖過於己者必見推矣遞相推讓卒當得最賢者矣事之次序理自當然瞽子父頑嶽曰所謂瞽叟之子也其父頑母嚚象傲蒸進也釋詁云蒸蒸勉益漸進之義其愚惡難化故漸益進之使治不至於姦凶之罪自帝曰疇咨若時登庸己下載帝堯求人之事所以明其聖能知人也親愛之至莫如朱知其惡而弗授共工之能言象恭鯀之才智天下之大姦佞也能隱其惡而任其職舉朝之賢如四嶽且弗能辨而稱其才况百官諸侯下民乎是舉世莫不賢之也堯獨聞舉而吁既而共工卒以惡誅鯀績弗成舜居微陋其德始升聞師舉則俞其言遂授之位非大聖獨見其能然乎其曰我其試哉將試觀其聖德暴之天下也故女之以二女命之尊位使之慎徽五典時叙百揆固非未能信而試之也或曰共工鯀之徒堯既知其惡矣何不去也曰彼所謂大姦者知惡之不可行也則能隱其惡立堯之朝以助堯之治何因而去之也及將舉而進之則堯知其不可蓋用過其分則其惡必見如王莽司馬懿若使終身居卿大夫之位必不起篡逆之謀而終身為才能之臣矣鯀居堯朝雖藏方命圯族之心飾善以取容故舉朝莫知其惡是其惡未嘗行也及居治水之任則其惡自顯矣蓋治水天下之大任也非其至公之心能舍己從人盡天下之議則不能成其功豈方命圯族者所能乎故其惡顯而舜得以誅之矣共工歡兜之徒皆凶惡之人也及舜登庸之始側陋之人顧居其上又將使之臣之此凶亂之人所以不能堪也故其惡顯而舜得以誅之如管蔡在武王之世何由作亂當成王少周公攝政乘其事㑹有以發其凶慝之心也或曰堯知鯀不可大任何為使之曰舜禹未顯舜登庸時始三十矣禹幼可知當時之人才智無有出其右者是以四嶽舉之也雖九年而功不成然其所治固非他人所及也惟其功有叙故其自任益强咈戾圮類益甚公議隔而人心離矣是以惡益顯而功卒不可成也故誅之當其大臣舉之天下賢之又其才力實過於人堯安得不任也若其時朝廷大臣才智有過鯀者則堯亦不任之矣舜典舜典夏時所作篇末載舜死夏時所作可知故史為追紀之辭與堯典同虞舜側微側陋微賤重華協于帝盛德光華與堯相襲協宜于帝位言以聖繼聖宜於天下也故云重華協于帝此句總言舜事曰若考古之帝舜重華協于帝自濬哲文明己下重叙其德也如堯典統言欽明文思安安己復云允恭克讓以下事重叙其德也濬哲文明溫恭允塞八事濬淵𢎞哲睿智文文章明聰明溫粹和恭恭敬允信當去聲塞充實八者以形容其聖德凡稱聖人取其德美之煥發者而稱之繫其人所取不必同也如稱堯則曰欽明文思安安稱仲尼則曰溫良恭儉讓要之皆聖人之德美稱之足以見其聖人耳譬夫言玉之美者或美其色之溫潤或稱其聲之清越或取其堅貞或美其精粹要之舉一則足以知其寶矣隨人之所稱足以見其美則可也𤣥德聲聞𤣥幽遠之稱穹𤣥是也舜潛德幽遠之中又其德深遠故云𤣥德也慎徽五典五典克從堯既命之以位而舜敬美其五常之教五典謂父子有親君臣有義夫婦有别長幼有序朋友有信也五者人倫也言長幼則兄弟尊卑備矣言朋友則鄉黨賔客備矣孔氏謂父義母慈兄友弟恭子孝烏能盡人倫哉夫婦人倫之本夫婦正而後父子親而遺之可乎孟子云堯使契為司徒教以人倫五者人倫大典豈舜有以易之乎五典克從則左氏所謂無違教也納于百揆謂進置之於揆度百事之任而其所揆裁處也皆時叙順成也賔于四門四門穆穆賔禮接也門內外之限也京師為內則四方皆外也中國為內則夷狄為外也穆穆和正之貌舜禮待四方而諸侯協和四夷懷來皆從其綏化也納于大麓烈風雷雨弗迷進置之大麓之任謂總領庶政也麓山阜草木百物所聚也訓猶聚也故孔氏云録也録亦總聚之義前云納于百揆又云納于大麓何也曰百揆揆度百事謀議之任也大麓總録庶政統領百職事之任也非是歷遷數職也各舉其事言耳云使之敬美五典則克從使之揆事則時叙使之賔懷四方則穆穆使之總庶政則隂陽和或曰序云歷試諸難安知非居數職也曰謂歷試如上諸難事耳非歷居數官也堯得舜則置之上位自五典而下皆非一司之事也大麓者總録庶政之稱故極其全功而言不可止舉一事也庶績咸熙黎民雍和隂陽順序風雨時若無烈風雷雨之愆錯逆亂也或曰不止言風雨弗迷而云烈風何也既曰烈風矣文曰弗迷辭似不順曰謂無烈風雷雨之迷錯也風無時之物故必言烈乃見迷若雷雨必順時若當暘而降冬發夏不震則不必迅暴然後為迷所以獨風言烈也詢事考言乃言底可績詢謀汝所行之事以考汝之前言皆可致功實也聞其言則堯知其聖矣見於事至於三年而後天下知其聖也在璿璣玉衡以齊七政在察也既受終則察七政之度不愆忒否以觀大意蓋聖人欽若昊天之道也天意既順於是遂類上帝禋六宗望山川遍羣神告其受命攝治也六宗三昭三穆也先己受終文祖矣故止禋六廟也堯之六廟或曰舜既受終始占天意何也如七政有愆則如之何曰未受終則天意何緣而有順逆理必受而後有察也如其有變則天時不順遜避而己何疑焉人苟誠焉則感於天地通於神明豈有二聖授受之際而有天意不順者乎注云或以為既受終則欽若昊天乃所當先故考齊七政非謂察己之意合天否也此則不然自堯之欽若命官乃舜納於大麓其見之政久矣既受命而君固宜察天意也肆類于上帝肆遂也猶後之屬文者言於是也自上日受終而類上帝禋六宗至遍羣神輯斂五瑞徴五等諸侯也至月終則四方諸侯至矣遠近不同來有先後故曰日見之不如他朝㑹之同期於一日也蓋欲以少接之則得盡其詢察禮意也既見則頒還其瑞玉自歲二月己下言巡狩之事非是當年二月便往亦非一歲之中遍歷五嶽也所至協正時日同其度量正五等諸侯之秩序制度之等差是修五禮也五等之制古有之矣防其亂故巡狩所至必修明也正其五等制度并其君臣所執圭幣皆使合理也如五器卒乃復者諸侯尊而贄重故已覲則復還其玉餘則否所以禮答列辟也五器即五瑞以其物言則玉以其寶言則瑞以成形言則器歸格於藝祖用特歸格告至於祖廟也此記禮也止言祖廟舉尊耳實皆告也如告朔太廟亦不止告祖也四時之祭則各有牲如告朔告至之類非祭也共用一牲而已故云用特若受終而禋則是祭也雖古禮不可詳知恐薦新之類亦止就廟耳惟時祭設主則各就其室非祭不必設主也每五載一巡狩則一方之諸侯朝于嶽下故云四朝敷奏以言明試以功車服以庸巡狩非能遍至諸國也至方嶽則覲見一方之君使各進陳其為治之說其言之善者則從之而明考其功有其功則賜車服以旌其功也注曰民功曰庸其言善則考而褒之其言不善則固有以告飭之矣肇十有二州上古九州治水之後禹别正其九州之封界舜始分為十二州在洪水既平之後此歷叙舜事故肇十二州在四罪之前言殛鯀在說用刑之中非是先分十二州而後殛鯀也禹貢云别九州者洪水治平而定九州之域在後始分十二州封十有二山孔傳云封大也必非以人力增大其山使大也蓋表其山為一州之鎮耳象以典刑象罪之輕重立為常刑鞭作官刑治官之刑也小過不用正刑撲作教刑凡教皆用不必指在學校流宥五刑情之有宜矜貸則流於遠以寬宥其刑五刑分其遠近眚災肆赦怙終賊刑眚過也謂過失入于罪者災害也謂非人所致而至者肆緩也今語有縱肆寬緩之義赦除釋之也眚者肆之災者赦之也雖罪非固犯失由於人故必致法矜其情而緩之耳災非由人宜加恤也故直赦之怙恃其惡與終固其非者凶惡之民也故殘害之以刑使不得為人害也是賊刑也上云皆舜之制刑立法如此欽哉欽哉惟刑之恤哉史官既載舜制刑之法而重明舜意云舜之於刑欽哉欽哉惟刑之為憂恤哉言其敬慎哀矜之至也注云說者皆以為舜語非也流共工於幽州放歡兜於崇山竄三苗於三危殛鯀於羽山四罪而天下咸服史官載述舜之制刑因叙其所用刑也四罪蓋肇十有二州之前大抵流放統謂之流故曰流宥五刑而於流之中有輕重之稱流者去遠之也如水流去放者屏斥之竄者投置之以罪之輕重地之善惡遠邇為差殛則誅死之也四者自輕及重而言殛鯀必於羽山者非時適在彼則惡之彰著或敗功害事於彼耳百姓如喪考妣百姓庶民也言庶民則君子可知矣正月元日舜格于文祖三年喪畢而朝廷公卿天下諸侯皆請舜正位故復至文祖之廟以告見焉孟子云其避丹朱之事蓋喪畢而不自有之畏避也朝廷諸侯請之是天下從之也推其事而言耳故史官不載其事或曰舜往避於南河之南迹之顯者書不云何也曰書之紀事不如後史之繁悉也若五載一巡狩則舜之在位其所往多矣皆不記也改正武成武王伐殷往伐歸獸識其政事作武成武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商底商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪豫小子既獲仁人敢祇承上帝以遏亂略華夏蠻貊罔不率俾恭天成命惟爾有神尚克相豫以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定釋箕子囚封比干墓式商容閭散鹿臺之財發巨橋之粟大賚于四海而萬姓悅服厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成既生魄庶邦冡君暨百工受命于周王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家我文考文王克成厥勳誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集豫小子其承厥志肆豫東征綏厥士女惟其士女篚厥𤣥黃昭我周王天休震動用附我大邑周乃反商政政由舊列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治程氏經說卷二
