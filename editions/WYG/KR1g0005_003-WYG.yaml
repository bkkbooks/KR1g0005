body:
  text: 程氏經説卷三詩解世傳胡氏本辭多不同疑後人刪潤今悉從舊本也周南關雎詩者言之述也言之不足而長言之詠歌之所由興也其發於誠感之深至於不知手之舞足之蹈故其入於人也亦深至可以動天地感鬼神虞之君臣迭相賡和始見於書夏商之世雖有作者其傳鮮矣至周而世益文人之怨樂必形於言政之善惡必見刺美至夫子之時所傳者多矣夫子刪之得三百篇皆止於禮義可以垂世立教故曰興於詩又曰誦詩三百授之以政不逹使於四方不能專對雖多亦奚以為古之人㓜而聞歌誦之聲長而識刺美之意故人之學由詩而興後世老師宿儒尚不知詩義後學豈能興起也世之能誦三百篇者多矣果能逹政專對乎是後之人未嘗知詩也夫子慮後世之不知詩也故序關雎以示之學詩而不求序猶欲入室而不由戸也天下之治正家為先天下之家正則天下治矣二南正家之道也陳后妃夫人大夫妻之德推之士庶人之家一也故使邦國至於鄉黨皆用之自朝廷至於委巷莫不謳吟諷誦所以風化天下如小雅鹿鳴而下各於其事而用之也為此詩者其周公乎古之人由是道者文王也故以當時之詩繫其後其化之之成至如一作於麟趾騶虞乃其應也天下之治由兹而始天下之俗由此而成風之正也自衛而下王道衰禮義廢今正風者無幾矣其刺上至指詆其惡豈復有譎諫之義也蓋發於人情怨憤聖人取其歸止於禮義而已惟雅亦然所美者正也所刺者變也規誨者漸失而未至於刺也為詩之義有六曰風曰賦曰比曰興曰雅曰頌風以動之上之化下下之風上凡所刺美皆是也賦者詠述其事蔽芾甘棠勿翦勿伐召伯所茇是也比者以物相比狼跋其胡載疐其尾公孫碩膚赤舄几几是也興者興起其義采采卷耳不盈傾筐嗟我懐人寘彼周行是也雅者陳其正理天生烝民有物有則民之秉彛好是懿德是也頌者稱美其事假樂君子顯顯令徳宜民宜人受禄于天是也學詩而不分六義豈知詩之體也詩之别有四曰風曰小雅曰大雅曰頌言一國之事謂之風言天下之事謂之雅事有大小雅亦分焉稱美盛德與告其成功謂之頌有是四端所謂四始也詩不出此四者故曰詩之至也得失之迹刺美之義則國史明之矣史氏得詩必載其事然後其義可知今小序之首是也其下則說詩者之辭也關雎麟趾之化王者之風故繫之周南化自周而南也鵲巢騶虞之徳諸侯之風國君而下正家之道先王之所以教天下也故繫之召南化自召而南也今本南字皆誤作公召伯為諸侯長故諸侯之風主之於召南二南者正家之道王化之所由興也故關雎之義樂得淑女以為后妃配君子也其所憂思在於進賢淑非說於色也哀窈窕思之切也切於思賢才而不在於淫色無傷善之心也是則關雎之義也漢廣漢廣言漢之廣大猶云江永也本言文王之道南被江漢之域因取漢水為興水之為限不可踰也以興禮義之為閑不可犯也南國被文王之化家齊俗厚婦人知守禮義既以禮義為防則非僻之思自絶雖有以非禮求之者亦不可得而犯也不可得而犯則不思犯矣夫人之休於木下必攀枝跛倚喬木不可攀及也故人絶欲休之思興女有髙潔之行非禮者自無求之之思也重稱漢水之廣不可思游泳以濟江之長永不可思方而渡也江大於漢雖方尚不可濟難於泳矣興以禮自閑不可侵凌也女之游者謂曠僻獨行可動之地異乎閨門之内姆傅之側也錯薪翹翹然必擇其端直者刈之如是之女豈所不願得哉之子者若得之以歸則言秣其馬矣情切之意惟其禮法之限不可得也不止無非禮之私思又知其端直之美而願慕之也汝墳關雎之化行則天下之家齊俗厚婦人皆由禮義王道成矣古之人有是道使天下蒙是化者文王是也故以文王之詩附於周南之末又周家風天下正身齊家之道貽謀自於文王故其功皆推本而歸焉漢廣婦人之能安於禮義也汝墳則乂能勉其君子以正也君子從役於外婦人為樵薪之事思念君子之勤勞如久饑也調作輖重也二章自勉之意伐肄見踰年矣言將見君子不遠棄我也三章勉君子以正言其勤勞猶魴魚之赬尾蓋王室暴政如焚焰雖則如是文王之德如父母望之甚邇被文王之德化忘其勞苦也麟之趾關雎而下齊家之道備矣故以麟趾言其應關雎之化行則其應如此天下無犯非禮也自衰世公子己下序之誤也以詩有公子字故誤耳麟趾之時麟趾不成辭言之時謬矣關雎始於衽席及於子孫至於宗族以被天下故自近而言之麟取其仁厚趾角定皆於麟取之皆有仁厚之象也趾不踐生草定之狀必有異常物角端有肉公子之仁厚如是也既言之又嘆美之曰吁嗟麟兮召南江有汜此亦文王時詩因附於此其嫡不使備嬪妾之數以侍君也汜水之分渚水之岐沱水之别歸謂從君子也美人君當使妾媵均承其澤故以歸言非謂是嫁來之歸也汜分之小洲渚之岐則大矣沱之為言别也幾相類矣言水之分流興夫人之不專君子前二章止言嫡不由是道其後自悔卒章則言不過我而無怨嘯歌順命蓋言其所以致嫡之自悔也處得其所處也過及也笑喜樂而已歌之發於中也谷風邶習習和風隂陽交和則感隂而成雨其感也隂其成也雨夫婦之道同黽勉和同不宜有怨怒也蓋和則夫婦之道成而家室正如隂陽和而成雨采葑菲者以其有下體也無以以也夫婦之道貴其有終德音好音也當期好音無違至於偕老承上章意我行道而遲遲者中心念其有違乎此也不遠伊邇謂此道不遠而邇何莫置我當其分乎送置也畿分也所以疆畿者所畫之界分耳荼至苦也乃以為甘新昏非禮之至也反好之如弟涇濁而渭清今涇反以渭為濁湜湜清貌視於淺處則見清彼以為濁而其沚自湜湜以言其惑而不得其正也愛其新昏而反不以我為屑也梁笱喻己所治家事惜為其毁敗梁所以壅蔽使母撤而逝之笱所以捕魚使母發而去之我身之所為且不能省閲暇惜我既去之後乎就其深矣己下陳其躬所為治家勤勞之事隨事盡其心力而為之深則方舟淺則泳游不可計其有與亡也强勉求為之耳不特如是治其家而已又周睦其鄰里鄉黨莫不盡其道我所為者如是不能心知念我而反以我為讎惡慉心所畜也惟其心既阻絶我之善故雖勤勞如是而不見取如賈之不售凡人所以憎而不知其善由心阻絶其善也昔惟恐養生之道窮困及爾至於顛覆今既遂其生既饒息矣乃比我於毒所以蓄藏美物者以禦冬為卒歲之備也今乃止以我禦窮困之時終乃見棄肄習也貽我以武暴憤怨習而為常矣塈息也不念昔之安息於我室家心所歸息也簡兮賢才之人可以為王臣而簡擇取之方將使之為萬舞日之方中明朗之時又在前列而處上見之宜可辨而不能知之也碩德之人俣俣然心廣體胖在公庭為萬舞也次章又言其才藝之美有力如虎才武也執轡如組藝也言其藝如此非在公庭見之也左執籥而右秉翟言其能之備羽籥二事皆能之也其顔色如渥丹然必言其顔色之充美者以其在前易見其才藝容色如是而公錫之以爵而已勞賤者之道也榛之在山苓之在隰乃其宜也賢者宜在王朝也云誰之思思彼王國之賢者言彼美德之人為王朝之臣乃得其所也言之所以嘆此之不得其所也或云美人蓋謂衛之賢者文意不然北風序云並為威虐謂君臣上下皆然四時之風春而自東則生物也夏而自南則養物也秋而自西則成物也冬而自北則殺物也以北風之殺害於物故以興虐政詩序謂百姓不親相携持而去乃述當時之事然考詩之辭乃君子見幾而作相招無及於禍患者也風既涼冷必將至於雨雪既尚威虐必將殘暴於人也以恩惠相好則携持而去耳虚寛貌邪緩也雍容之狀亟急也只且辭也言尚可寛容虚徐乎既急也哉涼氣喈聲雱霏皆雨散之狀行去也歸擇所安而往也同車亦偕行耳但卒章辭意益迫切同車己有駕之意莫赤者匪狐乎莫黑者匪烏乎以其色則知其物矣豈難辨哉觀其為政之道則知暴虐禍難將及於人矣君子全身遠害惟恐去之不速故其辭迫切其虚其邪既亟只且是也君子偕老鄘其德之深厚如山如河乃稱象德之服服章之設象其德位之宜徳尊位隆乃稱盛服今子之不淑奈何一章言人君之德服飾之盛宜如是而奈何反不稱次章又言服章容貌之美與德相稱則可尊仰故云胡然而仰之如天乎胡然而尊之為君乎帝君也帝言以其有德也三章重陳衣服德容之美誠如此之人乃是邦人之媛也媛美德之女定之方中美建國之得其時制一章言建國之事次章言相土地之初屬文之勢然也今文首言其事然後原其初者多矣既度其可然後卜以決之卜洛亦然古人之為皆是也人謀臧則龜筮從矣卒章序其勤勞以致殷富塞當也淵深也當其深所以成其富盛蝃蝀言奔則女就男衛國化文王之道淫奔人知恥而惡絶之詩人道是意以風止其事蝃蝀隂陽氣之交映曰而見故朝西而暮東在東者隂方之氣就交於陽也猶易之自我西郊夫陽唱隂和男行女隨乃理之正今隂來交陽人所醜惡故莫敢指之今世俗不以手指者因詩之言女子之義從於人也必待父母之命兄弟之議媒妁之言男先下之然後從焉不由是而奔就於男者猶蝃蝀之東故以興焉人所醜而不敢指視也奈何女子之行而違背父母兄弟乎違謂違背不由其命而奔也朝隮升於西者乃陽方之氣來交於隂則理之順故和而為雨崇朝不日之義奈何女子反遠其父母兄弟乎如是之人無他也懐男女之欲耳婚姻男女之交也人雖有欲當有信而知義故言其大無信不知命為可惡也苟惟欲之從則人道廢而入於禽獸矣女子以不自失為信所謂貞信之教違背其父母可謂無信矣命正理也以道制欲則順命言此所以風也相䑕相䑕之為物貪而畏人舉止驚攫無體態故以興人之無禮儀視䑕之有皮革以成其身有牙以完其形具形體以成物而動作如此猶有人之形質而無禮儀容止不若死也干旄卿大夫公子多好善者賢者受其禮意之厚當以善道告之詩推其意知樂告也干旌注旄干首九旗皆然九旗之物所建各不同若王建太常諸侯建旗而來就浚之郊禮下賢者素絲束帛也謂以束帛乘馬行禮於賢者彼姝美之人謂有美德者受其禮意如是當何以畀之知其必告以善道也紕疎布之狀組錯密之狀祝疑為竺厚積之意馬四至於五六馬帛之益多見其禮之益加也始畀之畀與也謂答之中予之謂交親之終告之謂忠告之待之益至報之益厚是為樂告也郊野外都邑城國中好賢益篤則賢者益至不好賢則士亦遠遯也淇澳衛淇澳之地潤澤膏沃而生綠竹竹生物之美者興武公之美内充而文章威儀著於外也有斐斐然文章貌君子有文章由其在學以自修如切如磋言學也如琢如磨自修也以象治玉譬人之治學修身瑟兮僴兮怐謹莊栗貌赫兮喧兮成德顯著於外也故云威儀也有斐君子終不可諼兮言文章君子盛德之至善人不能忘也此首章言德美文章由善學自治而然二章言其威儀之美服飾之盛三章言其成質之美如金錫圭璧然寛兮綽兮寛𢎞裕也綽開豁也重較大車言其多容而任重如大車也善戲謔言其樂易而以禮自飾防節不至於過是不為虐也猗猗言竹之態靑靑言其色如簀言其盛密比為簀綠竹竹也淇澳所有考槃賢者之退窮處澗谷間雖德體寛裕而心在朝廷寤寐不能忘懐深念其不得以善道告君故陳其由也碩人碩人大人尊賢之稱賢一作貴頎頎容質之偉盛言其位尊服飾之美又陳其家之貴盛德容之如是其來也禮數之備至近郊而說止復整車服而後入於朝君為之早退以與夫人燕處見禮之之重河水洋洋北流活活既盡言夫人之尊位重因以河水興人情故縱難制所以致嬖妾上僣而薄於夫人洋洋浩蕩活活流激貌河水如是故施罛不安强大之魚不能制也君情放縱故禮法不能制葭菼興衆多庶姜衆多孽孽不順如葭菼然賢士大夫莫能正有去而已君子陽陽簧為樂之器房安息之所苟自為樂又招其類由安息之所也翿舞所持自為歌舞又招其侣由傲樂之道陽陽自得陶陶自樂之狀皆不任憂責全身自樂而已君子居亂世如是而已揚之水王周人勞於戍申而怨思諸侯有患天子命保衛之亦宜也平王獨私其母家耳非有王者保天下之心也人怨宜也況天子當使方伯鄰國保助之豈當獨勞畿内之民故周人怨諸侯之人不共戍申也彼其之子謂諸侯之人申甫許皆申之地名揚之水瀾也淺故激力不足以流薪興力不足也楚蒲益輕言力不足愈深中谷有蓷蓷谷中所生之物待隂潤而後能生故暵則乾矣興夫婦樂歲則能相保凶年則至相棄也始章歎其遇艱難次章歎其人之不善歗長吟也悲恨深於歎矣卒章笑其恩義之素薄非由於今也故云何嗟及矣其怨益深也暵其濕矣當作隰矣亦乾也丘中有麻丘中宛宛平窊之處地之美者也麻可衣麥可食宜植丘中興賢者宜在朝則能養於人彼謂不賢者乃留於朝子之賢反窮處而咨嗟故思望其施施而來次章云彼乃留而子反歸鄉國思望其來食於朝李者徒能甘人之口而不能養人之物丘中反有李乃比不賢之人也佩者外飾玖非真玉彼留之人所貽我者徒文飾而無實貽我及人者緇衣鄭武公父子相繼為王司徒善於其職國人美其為國君而能好善道享服章宫室祿廪之報也緇衣卿衣也宜言其稱敝又改為言久其職適其館授之宫室授之粲賜之祿廪子謂王朝還更也今人言還知還解若還皆更義還予猶予還既授之居復賜之祿也蓆安舒之義服稱其德則安舒享此皆善善之功也子衿衿青學者之服青青舉家之辭世亂學校不修學者棄業賢者念之而悲傷故曰悠悠我心縱我不可以反求於汝謂往教强聒也子寧不思其所學而繼其音問遂爾棄絶於善道乎世治則庠序之教行有法以率之不率教者有至於移屏不齒又禮義廉讓之風所漸陶父兄朋友之義所勸督故人莫不强於進學及夫亂世上不復主其教則無以率之風俗雜亂浮偷父兄所教者趨利朋友所習者從時故人莫不肆情廢惰為自棄之人雖有賢者欲强之於學亦豈能也故悲傷之而已佩為青組綬挑輕躍達放恣不事於學則遨遊城闕而己賢者念之一日不見如三月之久也蓋士之於學不可一日忘廢一日忘之則其志荒矣放辟邪侈之心勝之矣東方之日齊齊國政衰君臣皆失道故風俗敗壊男女淫奔日興君月興臣日月明照則物無隱蔽姦慝莫容如朝廷明於上也今君不明故有淫奔之俗詩人以東方之日刺其當明而昏也日出當明而姝美之人在我室所以在我室履我即而來也即就也謂行跡履我跡而來奔也月出亦當明照而姝美之人在我門内所以在我門内履我發而來奔也發行步履其行步而來奔也由在上之人不明容此姦慝也東方未明政亂無節動非其時或早或暮無常度也挈壺氏司漏刻而朝廷興居不時是其職廢也言其不能正時矣非特刺是官也折柳以樊圃狂夫見之且驚躩知其為限也柳柔脆易折之物折之以為藩籬非堅固也狂夫以知其有限見之則躩然而驚晝夜之限非不明也乃不能知而不早則晏言無節之甚樊籬也營營青蠅止於樊是也盧令君荒於田獵故百姓苦之詩人陳古之賢君畋狩以時百姓見則善而美之園有桃魏觀此詩可見其憂深思遠矣所刺者不能用其民耳不能用其民則不能治豈復有徳教其致侵削可知也國無政事則亡故詩人憂思之深也桃果之賤者園有桃亦知其實以為殽興國有民雖寡能用則治今不能用其民故心憂之至歌且謠誦詠之為謠不知我者謂我驕慢彼人如是子曰何哉蓋未之知也故言我心之憂人莫知之重言人不知者不思耳其情至深切也棘尤賤物可用以食也行國猶駕言出游所以寫憂罔極不中也無衣唐武公始有晉國而能請命天子故詩人美之美其所可美也六七衣之數或曰繼世之君比受封有降然不知六七者何物也燠煖亦謂安耳葛生此詩思存者非悼亡者序為誤矣好攻戰則多離闊之恨葛之生託於物蘞之生依於地興婦人依君子誰與獨處是兩句誰與乎獨處而己獨旦獨處至旦也晝夜之永時思念之情尤切故期於死而同穴乃不相離也采苓首陽山生堅實之物故以興讒誣不實之人山者物之所生故采必於山苓生於山顛苦生於下葑蓺山陽之平地又各其所也興采言必於誠實之人下因誡於信讒之人造為巧言且無用信之又重誡曰置之置之且無以為然人之造為言者皆讒誣不實何所得乎謂不得實事也蒹葭秦蒹葭蘆葦衆多而强草類之强者民之象也葭待霜而後成猶民待禮而後治故以興焉蒼蒼而成白露為霜矣伊人猶斯人謂人情所在人情譬諸在水之中順而求之則易且近逆而求之則艱且遠淒淒青蒼之間也未晞未凝也猶禮教之未至采采茂盛未己方濃之狀未有禮教也禮教未立則人心不服而俗亂國何以安乎終南終南崇高厚大以興君位之尊山之高大必生美材人君尊崇必有令德條梅美材也有令德故宜稱顯服又美其容貎稱人君之位至止在此耳不必自外至也紀稜角堂平寛紀興禮法堂興德度山必有紀堂君必有禮德故宜其服稱其位當脩其身脩其德保其位故曰壽考不忘也晨風序言始棄其賢臣詩中又見其不求賢之意鴥飛疾貎以晨風興君子者取其來去之疾人君好賢待士有道則賢者歸之禮貌不至則浩然去矣如晨風之疾也林木茂盛則飛鳥所集興朝廷有道則賢者所就也故人君未見君子之時當憂心欽欽然念恐己之有未至也人君當如此而如何今乃忘我之多乎此詩主賢者見棄之意而言故云忘我欽欽不懈之意如何如何歎其如是也上章言朝廷有道則賢者歸之下章言當念下之有賢才也櫟山之所有也而有茂盛而苞者衆人之中固有秀異者矣隰有六駁亦然六見其盛多也義亦苞聚之類如下之有賢則當求而用之故於未見則憂而靡樂如何反忘我乎棣檖亦然言樹蓋其茂大者乃成樹耳欽欽靡樂如醉淺深之次漸言其至也無衣不與民同欲故民疾上之為詩人言為君當與民同欲也能同袍則雖寒不怨矣若推同袍之恩則民亦同上之欲王于興師謂若以王道興兵則百姓皆脩其戈矛與之同仇矣澤猶今謂汗衫之類墓門人情不脩治則邪惡生猶道路不脩治則荊棘生故以興焉墓門墓道之門也有荆棘則當以斧斤開析之佗才不善宜得賢師良傅以道義輔正之今夫也不良衆皆知之而不去之自昔誰如是乎此追咎自佗㓜小不擇師傅致成其惡誰昔然矣猶云從來誰如是乎前章言有棘言佗之不善後章言有梅深咎輔道之使然梅美木雖美木生墓門荊棘荒蕪之處則惡鳥萃矣雖有良心善性與不善人處則惡歸矣夫也不良詩人作詩以告責之告責之而不我顧必待顛沛當思我言防有鵲巢起土為防壟以為疆場之限上植以木於是鵲往巢焉有叢林之蔽翳則鵲巢之興人心有敝昏則讒誣者至卭丘也謂丘原廣平之處則有苕生之美草興人心髙明平夷則來善言侜謂譸張迂迴誣罔人者必迂曲以致其惡予美心所賢者憂讒誣賢善也中唐窊下之地瓦礫所聚也興處汙則不善者從焉鷊文草也㫖言美也惕惕懼也匪風檜亂極思治人情所然風者天之動以興上政車者人所為以興民俗天氣順則風時上德脩則政舉法制備則車成政教衰則民僻故以興上下焉匪風不和之風匪車無法之車發迅烈偈軒輊不定顧瞻盼戀思而傷怛也飄回旋嘌輕搖弔傷憫魚美好之物人所欲興善政人所思誰能烹魚以食人人將喜而助之誰能歸從周之道人將樂而與之懐相要結也好音和聲喜樂相從也蜉蝣曹蜉蝣朝生而暮死以興國將亡不能久也蜉蝣之羽羽翅稍猶曹君之奢靡衣裳楚楚然鮮美胡能久乎故憂其安所歸處也翼翅也采采華飾息止息掘閲升騰游翔之狀如雪潔白説税也經文説駕皆用説字憩也亦有悅義故通用候人共公遠君子而好近小人則所用多小人其進者非一也獨取候人而言者蓋時用者其微有自候人而升者故取其甚者而言耳彼候人者使荷戈役以守疆場乃其宜也如彼之人乃使服大夫之服又至於三百之多所以刺也三百言其多爾如三百㕓三百囷曹國之小豈容有三百之多左傳乘軒者三百人蓋因此詩也鵜乃在梁不濡而食興無功受祿不稱其服章之美待遇之禮遂稱也卒章興小人之無所取薈蔚草木之盛鬱茂之狀朝隮乎南山者以草木之盛有所取也饑渇乎季女者謂其有婉孌之容也今小人無德義可取何為而近乎下泉泉之潤物猶政令膏澤之及人泉寒冽則不能潤物在下則不能及物浸漬則害物苞叢生之茂者乃反害之是皆不得其所也稂蕭蓍皆下澤所生愾然既寤而歎念周道之衰也所謂思明王之詩也其卒也又傷無賢伯以糾率之故致如是芃芃然盛之黍苗蓋隂雨膏澤使然四方諸侯能勤王事由郇伯勞免之故也郇伯古方伯之有功者豳七月周公為此詩欲成王知先公先王致王業之由民之勞力趨時稼穡之艱難如此大火流下歲過中而行暮矣當有卒歲之具禦冬之備故以七月流火為首章也一一陽之月也一之日猶云冬之日夏之日也同我婦子我婦子同來致餉也盡室從事耕作農官至而喜之也春日遲遲采蘩祈祈女心傷悲殆及公子同歸再云春日遲遲上已云春日載陽此道人情之感時也女心之感不由缺一字而由遲遲故重言之蘩之用云生蠶正義云今亦用之應是也祈祈衆多祈祈如雲女勤力蠶事勞且傷悲也蓋所以為衣裝之備庶幾得如富貴之子及時而行也八月萑葦亦蠶備也蠶月條桑當蠶長之月也計歲氣之早晚不可指定幾月也言蠶長之月當枝落桑則用斧斨亦預備其器具也伐遠揚以猗女桑皆用斨斧我朱孔陽言染為𤣥黄之色我特致功於朱使鮮明蓋所以供公上為公子之衣裳故也為公子裘獻豣於公皆此義也民之知義如此則美俗成矣其同謂㑹聚共事也纘繼續之義謂修肄也後我稼既同謂收聚也斯螽莎雞蟋蟀説者雖為三物然考詩意恐是一物隨時異名耳動股始躍振羽翅成穹窒東山中已解嗟我婦子嘆其勤勞歲事既終又復為改歲之事歲暮入居室也自六月食鬱及薁己下果蔬棗酒皆為養老之具七月食𤓰己下皆為壯者之食故云食我農夫諸種皆入農事畢矣故嘆我農夫之勤勞又復執宫功也上入遷入都邑之居也乘屋蓋治也綯所用蓋屋鑿氷必在歲末而藏之須待春至故云三之日納於凌隂藏氷所以備暑而開氷必以仲春所以順時氣也其蚤用之於獻羔祭韭時夏頒氷是其後用時也朋酒斯饗歲功既畢朋聚以饗其樂殺羔羊謂盛禮公堂公為衆人㑹集之所鄉校是也稱兕觥祝觴之辭民相與為樂祝以夀考也此詩多陳節物大要言歲序之遷人事當及時耳所言或與月令異者月令多舉其始此但言其有時不必始有也鴟鴞管蔡流言及叛是亂也成王㓜而未知周公之志公為此詩告以王業艱難不忍其毁壊之意以悟王心此周公出征救亂之心作詩之志也此詩章句不完莫可究其全體據所存而言之可也鴟鴞惡鳥呼而謂之爾既取我子矣無更毁壊我室鴟鴞喻為惡者子喻管蔡室喻王室管蔡骨肉而與之為亂是既取我子矣毋更毁壞我王室也恩斯謂情愛勤斯謂篤厚以骨肉情愛之心篤厚之意養鬻育字通用子之道可憫惻也今乃取之其毒甚矣此皆謂鴟鴞之言不知謂之者主何物也迨天之未隂雨而下言自為安固閑防之道深至如此而尚或侮之興禽出而謂曰汝下民義不安拮据持捋貎捋荼披折貎疑其義然蓄租積取也卒瘏致病也所以如是勞苦以未有室家也興成王業之艱予羽尾殘敝然後成室翹翹然髙壯貎既其成就之勞如此故為風雨漂搖則其聲憂懼此周公之詩所以辭哀而意切也東山完言其完師而歸無死亡之患也思謂念其勤勞思其廬室荒廢也東山所征之地淮夷也滔滔紛紛不窮之狀言其久也隂雨則行役尤苦濛濛之時羇旅愁慘我在東而念歸則西悲謂懐西而悲也制彼裳衣治歸裝也士事也孔悝鼎銘曰作率慶士枚歴也枚卜之枚勿事行枚言當歸也蠋卷在葉中居如士卒之獨處自保其身敦然獨宿於車下也烝上比也猶云升也蠋在葉中故云烝在桑野其在外之久往來之勞每章重言見其感念之深丁夫于役田事廢室廬遂荒果臝己下是也在彼思念其如此町畽廬傍畦壠為麋鹿之場也不可以荒毁為畏當以為懐也此言與勿士行枚皆人情之正當然有自勉之意垤丘垤也有隂雨之候則婦思念其勞而悲嘆又計其行之久念其將至我征聿至謂我之行者其遂至也穹窒䑕穴穹空也窒所壅土也念其將至而灑􅂸甫問切復恨其留繫之久見其思望之情切也有敦圓成之狀𤓰苦𤓰之苦者延蔓栗薪之上栗薪堅木以其苦人所不取常在其所施於堅木言繫之固以比君子于役久留滯不還言如苦𤓰而繫堅木也自我不見今三年矣四章言歸而及時成婚姻之禮人情之所樂也倉庚之羽鮮明婚姻之時也嫁女之歸其馬皇駁有文彩也親結其摛女之親結之九十其儀儀之多也其歸而成新昏且甚嘉其舊昏相見之歡當如何也破斧是詩也周大夫刺朝廷之不知周公也而云惡四國四國為亂何足云惡也斧也斨也以及錡銶皆人之所用建國封親制典禮立政刑皆為天下之用猶人之有器用也故以斧為興言既破毁我斧又將缺我斨矣斨方孔而大者商奄始率管蔡為流言遂以叛將益動天下以傷壊王業惡日以滋當速誅也周公所以東征四國是皇也皇釋言匡正也周公之心勤勞王家如是可哀也其德亦甚大矣將大也我人猶云我公也云斯人可哀迫切之辭錡斧屬言益將有害訛與吪同動也或寢或吪振動於四國為是四國之亂振動恐其益亂天下嘉善也銶不知何物要之器之大於錡者遒逕急也加切於訛休美也哀周公之忠勤謂之甚美所以刺朝廷之不知也豳詩七月陳王業鴟鴞遺王東山言東征破斧伐柯九罭皆刺朝廷之不知周公於刺也復有淺深之異觀詩可見狼䟦美不失其聖伐柯破斧言周公之忠勤憂四國之亂天下征之之急如此伐柯乃既得罪人之後周公遲留未歸士大夫刺朝廷之不知所以還周公之道斧也柯也二物合而後成用故以興君臣夫婦之合伐柯匪斧則不能娶妻匪媒則不成言各有其道今欲周公之歸亦必有其道也二章言其道伐柯其取則不遠所執而伐者乃柯也以之為則則是矣今欲反周公取則於周公可也周公者動必以禮者也亦當以禮致之則周公可得而覯見也故云我欲覯見之子惟以禮乃可籩豆禮器所以行禮語云俎豆之事籩豆有踐謂禮儀是用也九罭周公為詩遺王王木知周公之志故公居東未反士大夫始刺朝廷不知反周公之道伐柯是也既又思之切刺之深責在朝廷之人不速還公也九罭網之固密者也鱒魴魚之美者詩云必河之魴九罭之網則得鱒魴之魚用隆厚之禮則得聖賢我欲覯之子當用上公之禮服往逆之二章言公之不得其所也鴻飛戾天者也今乃遵渚言不得其所公既征而歸則未得其所蓋朝廷未以師保重禮往逆也使公不得所於外於汝信安處也矣深責在朝廷之人也宿安息也不復謂未還舊職四章祈反周公誠切之意是以猶所以朝廷所以有衮衣之章用尊禮聖賢無以用也無以是服逆我公歸來無使士民之心悲思望公也狼跋周公攝政居危疑之地雖成王不知四國流言終不能損其聖德者以其忠誠在於王家無貪欲之私心也狼獸之貪者猛於求欲故檻於機穽羅縶前跋後疐進退困險詩人取之以言夫狼之所以致禍難危困如是者以其有貪欲故也若周公者至公不私進退以道無利欲之蔽以謙退自處不有其尊不矜其德故雖在危疑之地安步舒泰赤舄几几然也碩大也謂崇大之位膚美也謂盛美之德孫者避而不居也其謙遜不以崇髙聖智自處所以天下稱聖處危而安也几安義几之立名取其義也此大舜所謂汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功也使周公有貪欲崇髙得名之心其能得天下之與如是乎唯其處已也夔䕫然有恭畏之心存誠也蕩蕩焉無顧慮之意所以不失其聖德音所以不瑕也先儒以狼跋疐不失其猛興周公不失其聖不失其猛奚若虎豹胡獨取狼也古之詩人比興以類也是以香草譬君子惡鳥譬小人豈有以豺狼興聖人乎且上二句言跋言疐實有几几不瑕之義但此詩體與他詩不類故不通耳此詩在六義比程氏經説卷三
