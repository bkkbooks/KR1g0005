body:
  text: 程氏經說卷七論語説學而學而時習之不亦説乎習重習也時復思繹浹洽於中則説也有朋自逺方來不亦樂乎以善及人而信從者衆可樂也人不知而不愠不亦君子乎雖樂於及人不見是而無悶乃所謂君子有子曰其為人也孝弟孝弟順德也故不犯上豈復有逆理亂常之事德有本本立則其道充大孝弟於其家而後仁愛及於物所謂親親而仁民也故為仁以孝弟為本論性則仁為孝弟之本巧言令色鮮矣仁謂非仁也知巧言令色之非仁則知仁矣曽子之三省忠信而已道千乗之國今之諸侯能如是足以保其國矣子曰弟子入則孝出則弟為弟子之職力有餘則學文不脩其職而學一作先文非為己之學也子夏曰賢賢易色見賢改色有敬賢之誠也事親事君與朋友交皆盡其誠學求如是而已子曰君子不重則不威不厚重則無威儀所學不能安固所主在於忠信所親者必忠信遷善不可不速君子之自脩當如是也曽子曰慎終追逺民德歸厚矣居䘮盡禮祭祀致誠慎終追逺之大者也凡事能慎其終不忘於逺足以化民歸於厚德矣子貢曰夫子温良恭儉讓以得之温良恭儉讓盛德之輝光接於人者也温和厚也良易直也恭荘敬也儉節制也讓謙遜也徳容如是是以諸侯敬而信之三年無改於父之道可謂孝矣孝子居䘮志存守父在之道不必主事而言也有子曰禮之用和為貴恭而安别而和為可貴也有子曰信近於義言可復也信能守約恭能逺恥近於禮義也因其不失於相近亦可尚也敏於事勇於行也貧無諂富無驕能處其分也樂與好禮能自脩也切磋琢磨自脩各以其道也告之以樂與好禮而知為自脩之道知來者也為政子曰吾十有五而志于學聖人言已亦由學而至所以勉進後人也立能自立於斯道也不惑則無所疑矣知天命窮理盡性也耳順所聞皆通也從心則不勉而中矣温故而知新温故則不廢知新則日益斯言可師也所謂日知所亡月無忘所能也先行其言而後從之踐言則可信周而不比周為遍及之義君子道𢎞周及於物而不偏比小人偏比故不能周學而不思則罔學不思則無得力索而不問學則勞殆攻求異端則害於正人苟恥其不知而不求問是終不知也以為不知而求之則當知矣故云是知也多見而闕其不安者寡悔之道也君子行已能慎得禄之道也舉直錯諸枉舉錯得義則民心服書云孝乎書之言孝則曰惟孝友于兄弟則能施於有政非其鬼而祭之諂也不當祭而祭之諂於鬼神也時多非禮之祀人情狃於習俗知義之不可而不能止盖無勇耳八佾孔子謂季氏八佾舞於庭是可忍也孰不可忍也忍為是則何所不能為也人而不仁如禮何人而不仁如樂何仁者天下之正理失正理則無序而不和林放問禮之本飾過則失實故寜儉䘮主於哀故寜戚夷狄之有君夷狄且有君不如諸夏之僣亂無上下之分也君子無所爭必也如一本無如字射乎射者正已而已非有爭也其爭也君子言君子其爭乎巧笑倩兮美質待禮以成徳一作法猶素待繪以成絢子夏能諭故曰起予夏禮吾能言之夏商之禮未盡亡也而杞宋之文籍法度不足考證矣故夫子不能成之禘自既灌而徃者灌者祭之始也自灌而徃皆不欲觀蓋非一事之失也先儒皆謂以魯逆祀而云逆祀固失禮之大者其節文皆失也天下之事苟能使之中禮則治之如視諸掌也不知也者不欲顯言之也非止禘也因禘失禮之甚而言耳奥喻貴臣竈喻用事者夫子知其意抑之云若獲罪於天求媚何益也射不主皮為力不同科射有五善不必專以主皮為工也工力非一端苟有可取不必同科也古者取善之周也事君盡禮人以為諂也當時事上之禮簡也關雎樂而不淫哀而不傷樂得淑女非淫其色也哀思之切無傷善之心也切於善一作色乃傷善也管仲之器小哉謂管仲器小非止謂不知禮也或問其知禮乎故荅以不知器大則自知禮矣樂始翕如純如皦如至於繹如非通於樂者孰能知之子謂武盡美矣未盡善也一有傳之失者故未盡善居上不寛為禮不敬臨䘮不哀吾何以觀之哉居上以愛人為本主於寛厚禮主於敬䘮主乎哀不然是無本也何以觀乎里仁子曰里仁為美居以親仁為美處不擇仁焉得為知惟仁者能好人能惡人得其公正也苟志仁無惡也苟志於仁則無不善也君子去仁惡乎成名去仁則不得名君子矣君子無終食之間違仁得善弗失也道不可須臾離可離非道言道也造次顛沛必於是言守道也有能一日用其力於仁矣乎我未見力不足者欲仁則仁斯至矣不繫乎力也用力於仁者固嘗一作當有之已未嘗見耳豈敢謂天下無仁者也人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人傷於忍朝聞道夕死可矣人不可以不知道苟得聞道雖死可也士志於道而恥惡衣惡食者未足與議也志於道而心役乎外何足與議也君子之於天下也無適也無莫也義之與比君子之於天下無必徃也無莫徃也惟義是親君子懐徳小人懐土君子懐刑小人懐惠在上者志存於徳則民安其土在上者志在嚴刑則民思仁厚者而歸之放於利而行多怨心存乎利取怨之道也蓋欲利於己必損於人禮者為國之本能以禮讓復何加焉不能以禮將如禮何無禮讓則不可以為國也不患無位患所以立不患莫己知求為可知也君子求其在己者故患身無所立不患無位以行也求為可知之行不患人之不知己也曽子曰夫子之道忠恕而已盡已之謂忠推已之謂恕忠體也恕用也孟子曰盡其心者知其性也君子喻於義小人喻於利惟其深喻是以篤好德不孤必有鄰事物莫不各以類聚故德必有鄰公冶長斯焉取斯斯助語詩云恩斯勤斯子貢問曰賜也何如子曰女器也器者尚飭之物子貢文勝故云器也復問何器曰瑚璉也瑚璉貴器飭之盛者皆從玉見其飭之美或曰雍也仁而不佞佞辨才也人有之則多入於不善故夫子云焉用佞子使漆雕開仕使求禄也對以已學且未能信信謂自得故夫子説其篤志子曰道不行乗桴浮于海從我者其由也與浮海居夷譏天下無賢君也子路勇於義故謂其能從已子路以為實欲浮海也故喜夫子與已夫子許其勇而謂其不能量度事理也取材裁度也材裁通用子謂子貢曰女與囘也孰愈子貢喜方人故問其與囘孰愈子貢既能自謂何敢望囘故云吾與女弗及所以勉之進也宰予晝寢人既眈惑難以語學矣因責其不踐平日之言也人有慾則無剛剛則不屈於欲也我不欲人之加諸我吾亦欲無加諸人仁也施諸已而不願亦勿施於人恕也恕或能勉之仁則非子貢所及夫子之文章可得而聞也夫子之言性與天道不可得而聞也子貢聞夫子之至論而歎美之言也子路有聞未之能行唯恐有聞子路果於行者故有聞而未能行惟恐復有聞也晏平仲善與人交久而敬之人之交久則敬衰久而能敬所以為善與人交也世謂臧文仲知僣上失禮安得為知也令尹子文三仕為令尹無喜色三已之無愠色其然豈其然乎人不能見其色則可矣謂其無喜愠則非也苟無喜愠何以知其未仁也夫子獨稱其以政告新為忠斯可見矣季文子三思而後行使晉時也其再慮當矣至於求遭䘮之禮則過矣子在陳曰歸與夫子之刪詩書使羣弟子編緝之也伯夷叔齊之節至髙峻也然其居之以寛故怨希不然則不可以處世矣孰謂微生髙直君子敬以直内所枉雖小而害則大足恭過恭也左丘明古之聞人顔淵季路與夫子之言志夫子安仁也顔淵不違仁也季路求仁也夫人能自知其過者鮮也然知過非難也能自訟之為善自訟不置能無改乎十室之邑必有忠信如丘者焉不如丘之好學也忠信質也語生質則不異於人人不若已之好學耳所以勉人學也雍也雍也可使南面仲弓才德可使為政也子桑伯子内主於敬而簡則為要直内存乎簡而簡則為踈略仲弓可謂知㫖者子桑伯子之簡雖可取而未盡善故夫子云可也顔子之怒在物而不在已故不遷有不善未嘗不知知之未嘗復行不貳過也子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉夫子之使子華子華之為吾子使義也而冉求乃欲資之而為之請粟夫子曰與之釜者所以示冉求以不當與也求不達而請益則與之庾求猶未達夫子之意故自與之粟五秉故夫子非其繼富蓋赤苟至乏則夫子必周之矣原思為之宰則與之粟九百思辭其多故謂之曰苟有餘則分諸鄰里鄉黨夫子之使子華義也原思為宰有常禄也子謂仲弓曰犂牛之子騂且角疑多曰字角始角也可用時也囘三月不違仁得善則服膺弗失也其餘則日月至焉至謂心存於仁非能至於仁也季康子問仲由子貢冉有其才可以從政乎夫子答以各有所長非唯三子者人各有所長能取其長皆可用也季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣仲尼之門能不仕大夫之家者閔子曽子數人而已顔子之樂非樂簞瓢陋巷也不以貧窶累其心而改其所樂也故夫子稱其賢冉有曰非不説子之道力不足也夫子告以為學由已未有力不足者所謂力不足者乃中道而自廢耳今女自止非力不足也君子儒為已小人儒為人行不由徑動必従正道不有祝鮀之佞而有宋朝之美無鮀之巧言與朝之令色難免乎今之世必見憎疾也道不可離也事必由其道猶出入之必由戸也文質彬彬然後君子君子之道文質得其宜也人類之生以直道也欺罔而免者幸耳好之者不如樂之者非有所得安能樂之中人以上可以語上中人以下不可以語上才卑而語之髙安能入也樊遲問知能従百姓之所義者知也鬼神當敬也親而求之則非知也以所難為先而不計所獲仁也知者樂水仁者樂山樂者一本有喜字好也知者樂於運動若水之通流仁者樂於安靜如山之定止知者得其樂仁者安其常也齊一變至於魯魯一變至於道夫子之時齊強魯弱孰不以為齊勝魯也然魯猶存周公之法制齊由桓公之霸為從簡尚功之治太公之遺法變易盡矣故一變乃能至魯魯則脩廢舉墜而已一變則至於先王之道也觚不觚觚哉觚哉觚而失其觚之形制則非觚也故君而失其君之道則為不君臣而失其臣之職則為虛位宰我問曰仁者雖告之曰井有仁焉其従之也宰我問仁者好仁不避患難雖告之以赴井為仁亦從之乎夫子謂不然君子可使之有徃不可陷之於不知可欺以其方不可罔以非其道子曰君子博學於文約之以禮亦可以弗畔矣夫博學而守禮雖未知道亦可以弗違畔於道矣南子非正而衛君以為夫人使見夫子夫子雖不願見安能拒之乎子路以夫子之被強也故不説夫子為陳不得已之故而謂之曰吾道之否塞如是蓋天厭之猶天䘮予也中庸天下之正理德合中庸可謂至矣自世教衰民不興於行鮮有中庸之徳也博施於民而能濟衆博施厚施也博而及衆堯舜病其難也聖人濟物之心無窮已也患其力不能及耳聖人者人倫之至惟聖人為能盡仁道然仁可通上下而言故曰何事於仁必也聖乎恕者為仁之方也述而傳述而不作信古而好之自比於老彭也黙而識之學而不厭誨人不倦何有於我哉黙識而無倦者有諸已者也何有於我勉人學當如是也子貢曰學不厭知也教不倦仁也仁且知夫子既聖矣以仁知而言也子曰徳之不脩學之不講聞義不能徙不善不能改是吾憂也憂如是則徳日新申申和適之貌夭夭温裕之貌吾不復夢見周公夣見周公夫子盛時寤寐常存行周公之道及其老也志慮衰矣存道者心無老少之異行道者身老則衰矣志於道據於徳依於仁㳺於藝學者當如是㳺泳於其中子曰自行束脩以上吾未嘗無誨焉苟以禮來者無不受也不憤不啓不悱不發待其誠至而後告也舉一隅不以三隅反則不復也既告之必待其自得也憤悱誠意見於辭色也子食於有䘮者之側未嘗飽也食甘矣則飫飽有䘮者在側豈能甘也子謂顔淵曰用之則行舍之則藏唯我與爾有是夫用舍無所預於己安於所遇者也或曰然則知命矣夫曰安所遇者命不足道也君子知有命故言必曰命然而安之不以命知求無益於得而不求者非能不求者也子路曰子行三軍則誰與子路自負其勇謂夫子必與己故夫子抑而教之子曰富而可求也雖執鞭之士吾亦為之富人之所欲也苟於義可求雖屈已可也如義不可求寜貧賤以守其志也非樂於貧賤義不可去也子之所慎齋戰疾三者夫子所重慎人之事為多矣能察知所慎善觀聖人矣子在齊聞韶三月不知肉味當食而聞忘味之美也三月乃音字誤分為二也不圖為樂之至於斯歎其美也作三月則於義不可夫子為衛君乎問與輒否乎二人者讓國而逃諫伐而餓終無怨悔夫子以為賢故知其不與輒也飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲雖疏食飲水不能改其樂故云樂亦在其中矣非樂疏食飲水也不義而富貴視之輕如浮雲也子曰加我數年五十以學易可以無大過矣此未贊易時言也更加我數年至五十以學易道無大過矣古之傳易如八索之類皆過也所以易道未明聖人有作則易道明矣云學云大過皆謙辭子所雅言詩書執禮皆雅言也世俗之言失正者多矣如吳楚失於輕趙魏失於重既通於衆君子正其甚者不能盡違也惟於詩書執禮必正其言也葉公不知仲尼故問於子路子路以其不能知聖人也故不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾發憤至於忘食自樂能忘其憂老將至而不知好學之篤耳聖人未嘗自居於聖也惟自謂好學耳我非生而知之者好古敏以求之者也亦自謂好學也所以勸人學也敏速也謂汲汲也子不語怪力亂神怪異勇力悖亂鬼神之事皆不以語人也子曰天生徳於予桓魋其如予何人莫不知有命也臨事而不懼者鮮矣惟聖人為能安命子曰二三子以我為隱乎孔孟之道一也其教人則異孔子常俯而就之孟子則推而髙之孔子不俯就則人不親孟子不推髙則人不尊聖賢之分也二三子不能窺見聖人故夫子告之以無隱也子以四教文行忠信教人以學文脩行而存忠信也忠信本也一心之謂誠盡心之謂忠存於中謂之孚見於事謂之信聖人吾不得而見之矣得見君子者斯可矣善人吾不得而見之矣得見有恒者斯可矣才徳出衆謂之君子善人良善之人也有常雖無善守其常分者也若實無而為有以虛而為盈處約而為泰則妄人也難謂之有常矣子釣而不綱弋不射宿聖人之仁不盡物不驚衆也子曰蓋有不知而作之者我無是也不知而作妄作也聖人固無不知也在衆人雖未能知之若能多聞擇善而從多見而記識之亦可次於知之者也互鄉之人習於不善難與言善也今四方之俗有頑惡難治者皆習使之然也互鄉之童子見夫子而門人怪之子曰與其進之志善不與其退而不善也拒絶之則大甚矣人潔已而來當與其潔也豈保其徃而不善乎聖人待物之𢎞也子曰仁逺乎哉我欲仁斯仁至矣為仁由已欲之則至未有力不足者也陳司敗問昭公知禮乎夫子以知禮荅司敗之問而以為黨在所不荅也而復自云有過者蓋巫馬期約以復告也子與人歌而善必使反之而後和之歌必全章也與割不正不食席不正不坐同也子曰文莫吾猶人也常人於文飭則皆欲勝人實行則未之見也子曰若聖與仁則吾豈敢夫子謙自謂不敢當仁聖然行之而不厭以誨人而不倦不厭不倦非己有不能也公西華見聖人之道逺而誨人不倦故歎曰正唯弟子不能學耳子疾病子路請禱子曰有諸謂有是理乎子路以古人之誄告夫禱者悔過遷善祈神之祐也聖人未始有過無善可遷故云丘之禱久矣奢則不孫儉則固奢儉皆失禮也而奢之害大君子坦蕩蕩小人長戚戚君子循理故舒泰蕩蕩然小人役於物故多憂戚子温而厲威而不猛恭而安德容之盛也善哉門人之能觀聖人也泰伯泰伯其可謂至徳也已矣三以天下讓民無得而稱焉泰伯之讓非謂其弟也為天下也其事深逺故民不能識而稱之而聖人謂之至徳不立一讓也逃之二讓也文身三讓也恭而無禮則不安故勞慎而無禮則多懼故葸勇而無禮則不順故亂直而無禮則好訐故絞君子篤於親則民興而樂仁故舊不遺則民化而篤厚曽子有疾召門弟子曰啓予足啓予手君子曰終小人曰死君子保其身以殁為終其事也故以全歸為免矣曽子有疾孟敬子問之曽子言曰鳥之将死其鳴也哀不問而自言故曰言曰鳥畏死故鳴哀人將死而言出於誠也故善君子所貴者慎之於身言動之間皆有法則容貌荘敬則可以逺暴慢顔色正則自知其信辭氣之出不使至於鄙倍鄙謂偏僻倍謂違咈義理倍與背字通用孟子曰師死而遂倍之籩豆之事則有司存焉政在脩已身正則官治若乃事物器用之細則有司存焉曽子曰以能問於不能顔子能無我矣曽子曰可以託六尺之孤節操如是可謂君子矣曽子曰士不可以不𢎞毅任重而道逺𢎞大剛毅而後能勝重任而逺到子曰興於詩立於禮成於樂詩發於人情止於禮義言近而易知故人之學興起於詩禮者人之模範守禮所以立其身也安之而和樂德之成也民可使之由是道不能使之皆知也子曰好勇疾貧亂也人而不仁疾之已甚亂也好勇而不安其分與不仁而無所容皆必為亂也子曰如有周公之才之美使驕且吝其餘不足觀也已居貴富而驕吝無德之甚也雖才美奚為才美謂威儀技藝子曰篤信好學守死善道危邦不入亂邦不居天下有道則見無道則隱邦有道貧且賤焉恥也邦無道富且貴焉恥也君子處身如是知無道而富貴為可恥而不處特立者能之不在其位不謀其政不在其位則不任其事也若君大夫問而告者則有矣師摯之始關雎之亂洋洋乎盈耳哉師摯之始必定公始仲尼自衛反魯時也哀公之世則摯適齊矣子曰狂而不直侗而不愿悾悾而不信吾不知之矣狂則必直侗則必愿悾悾則必信自當然也而有不然者偽妄之甚不可得而知也謂非常理也巍巍乎舜禹之有天下也舜禹得天下而已不與求巍巍其德之髙也大哉堯之為君也巍巍崇髙其大與天同也蕩蕩其德之廣大不可得而名言也其成功可見者則巍巍崇髙其文章則煥然至盛舜有臣五人而武王有亂臣十人以唐虞之際方之周為盛也然又有婦人焉惟九人耳才之難得如此婦人邑姜也三分天下有其二而尚服事於殷可謂至德也子曰禹吾無間然矣禹德之至不可復有加矣再言無間稱美之深也子罕子罕言利與命與仁計利則害義命之理微仁之道大皆所罕言也達巷黨人曰大哉孔子博學而無所成名常人之學多以一長而得稱成名也達巷黨人大夫子之博學而怪不以一善得名於時盖其不知聖人也故夫子聞之而謂門人曰欲使我何所執執御乎執射乎吾執御矣御藝之最下者子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下麻冕用純儉而無害從衆可也拜乎上泰也泰謂簡慢事君不可泰也寜違衆也君子處世事之無害於義者從俗可也害於義則不可從按時氏本伊川先生作論語解止此然以大全集校之閤本詳畧不同後人又自子絶四以下至堯曰纂集遺書外書之有解者以附益之今因重出故從閤本云程氏經説卷七
