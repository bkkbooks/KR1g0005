body:
  text: 程氏經説卷一易説繫辭天尊地卑尊卑之位定而乾坤之義明矣髙卑既别貴賤之位分矣陽動隂靜各有其常則剛柔判矣事有理一本作萬事理也物有形也事則有類形則有羣善惡分而吉凶生矣象見於天形成於地變化之迹見矣隂陽之交相摩軋八方之氣相推蕩雷霆以動之風雨以潤之日月運行寒暑相推而成造化之功得乾者成男得坤者成女乾當始物坤當成物乾坤之道易簡而已乾始物之道易坤成物之能簡平易故人易知簡直故人易從易知則可親就而奉順易從則可取法而成功親合則可以常久成事則可以廣大聖賢德業久大得易簡之道也天下之理易簡而已有理而後有象成位乎其中也聖人既設卦觀卦之象而繫之以辭明其吉凶之理以剛柔相推而知變化之道吉凶之生由失得也悔吝者可憂虞也進退消長所以成變化也剛柔相易而成晝夜觀晝夜則知剛柔之道矣三極上中下也極中也皆其時中也三才以物言也三極以位言也六爻之動以位為義乃其序也得其序則安矣辭所以明義玩其辭義則知其可樂也觀象玩辭而能通其意觀變玩占而能順其時動不違於天矣彖言卦之象爻隨時之變因失得而有吉凶能如是則得無咎位有貴賤之分卦兼小大之義吉凶之道於辭可見以悔吝為防則存意於徽小震懼而得無咎者以能悔也卦有小大於時之中有小大也有小大則辭之險易殊矣辭各隨其事也聖人作易以準則天地之道易之義天地之道也故能彌綸天地之道彌遍也綸理也在事為倫治絲為綸彌綸遍理也遍理天地之道而復仰觀天文俯察地理驗之著見之迹故能知幽明之故在理為幽成象為明知幽明之故知理與物之所以然也原究其始要考其終則可以見死生之理聚為精氣散為遊魂聚則為物散則為變觀聚散則見鬼神之情狀萬物始終聚散而已鬼神造化之功也以幽明之故死生之理鬼神之情狀觀之則可以見天地之道易之義與天地之道相似故無差違相似謂同也知周乎萬物而道濟天下故不過義之所包知也其義周盡萬物之理其道足以濟天下故無過差旁行而不流旁通逺及而不流失正理順乎理樂天也安其分知命也順理安分故無所憂安土安所止也敦乎仁存乎同也是以能愛範圍俗語謂之模量模量天地之運化而不過差委曲成就萬物之理而無遺失通晝夜闢闔屈伸之道而知其所以然如此則得天地之妙用知道德之本源所以見至神之妙無有方所而易之準道無有形體道者一隂一陽也動靜無端隂陽無始非知道者孰能識之動靜相因而成變化順繼此道則為善也成之在人則謂之性也在衆人則不能識隨其所知故仁者謂之仁知者謂之知百姓則由之而不知故君子之道人鮮克知也運行之迹生育之功顯諸仁也神妙無方變化無迹藏諸用也天地不與聖人同憂天地不宰聖人有心也天地無心而成化聖人有心而無為天地聖人之盛德大業可謂至矣富有溥博也日新無窮也生生相續變易而不窮也乾始物而有象坤成物而體備法象著矣推數可以知來物通變不窮事之理也天下之有不離乎隂陽惟神也莫知其鄉不測其為剛柔動靜也易道廣大推逺則無窮近言則安靜而正天地之問萬物之理無有不同乾靜也專動也直専專一直直易惟其專直故其生物之功大坤靜翕動闢坤體動則開應乾開闔而廣生萬物廣大天地之功也變通四時之運也一隂一陽日月之行也乾坤易簡之功乃至善之德也易之道其至矣乎聖人以易之道崇大其德業也知則崇髙禮則卑下髙卑順理合天地之道也髙卑之位設則易在其中矣斯理也成之在人則為性誠之者性也人心存乎此理之所存乃道義之門也聖人見天下深遠之事賾深逺也而比擬其形容體象其事類故謂之象天下之動無窮也必觀其會通會通綱要也乃以行其典禮典禮法度也物之則也繫之辭以斷其吉凶者爻也言天下之深逺難知也而理之所有不可厭也言天下之動無窮也而物有其方不可紊也擬度而設其辭商議以察其動擬議以成其變化也變化爻之時義擬議議而言之也舉鳴鶴在隂以下七爻擬議而言者也餘爻皆然也有理則有氣有氣則有數行鬼神者數也數氣之用也大衍之數五十數始於一備於五小衍之而成十大衍之則為五十五十數之成也成則不動故損一以為用天地之數五十有五成變化而行鬼神者也變化言功鬼神言用顯明於道而見其功用之神故可與應對萬變可贊祐於神道矣謂合德也人惟順理以成功乃贊天地之化育也知變化之道則知神之所為也與上文相連不合在下言所以述理以言者尚其辭謂於言求理者則存意於辭也以動者尚其變化則變也順變而動乃合道也制器作事當體乎象卜筮吉凶當考其占受命如響遂知來物非神乎曰感而通求而得精之至也自天一至地十合在天數五地數五上簡編失其次也天一生數地六成數才有上五者便有下五者二五合而成隂陽之功萬物變化鬼神之用也或曰乾坤易之門其義難知餘卦則易知也曰乾坤天地也萬物烏有出天地之外者乎知道者統之有宗則然也而在卦觀之乾坤之道簡易故其辭平直餘卦隨時應變取舍無常尤為難知也知乾坤之道者以為易則可也程氏經説卷一
