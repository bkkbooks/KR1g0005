body:
  text: 程氏經說五經總義類提要臣等謹案程氏經說七卷皆伊川程子解經語也原本不著編輯者名氏書録解題謂之河南經說稱繫辭一書詩二春秋一論語一改定大學一又稱程氏之學易傳為全書餘經具此其門目卷帙與此本皆合則猶宋人舊笈也其中若詩書解論語說本出一時雜論非専注之書春秋傳則専著而未成觀崇寧二年自序可見至繫辭說一卷文獻通考併于易傳共為十卷宋志則于易傳九卷之外别著録一卷然程子易傳實無繫辭故吕祖謙集十四卷之說為繫辭精義以補之此卷疑或後人掇拾成帙以補其缺也改定大學兼載明道之本或以兄弟之說互相參考歟明徐必達編二程全書併詩解二卷為一卷而别增孟子解一卷中庸解一卷共為八卷然經義考引康紹宗之言謂孟子解乃後人纂集遺書外而成非程子手著至中庸解之出吕大臨朱子辨證甚明亦不得竄入程氏經說增此一種故今所録仍用宋本之舊焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f08e7eef1f2cc3ce5c33dc8d2ff2a6c1746e5060176bae76f4cd793ac13c1106
