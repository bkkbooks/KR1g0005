body:
  text: 程氏經説卷四小雅鹿鳴自鹿鳴以下二十二篇各賦其事於其事而用之其周公之謂乎與二南同也燕羣臣嘉賓則用鹿鳴鹿食則相呼故以興燕樂呦呦和聲和聲相呼共食野之草物情相樂也君臣賓主相樂如此云我有嘉賓鼓瑟吹笙言其相樂又以幣帛將其誠意故云承筐是將承以藉之筐以貯之既有誠樂之厚意則人心感悅而相好以此示我之列位故人勸而得盡其歡心次章又言所燕禮嘉賓聞望昭明示民以厚之之意使儀法之三章言其樂之長久無斁四牡四牡之義憫使臣之勤勞故云有功而見知則説矣上不知下之勞則下不自盡其力故四牡之義廢則君臣缺矣周道猶通途也倭遲回逺豈不懷歸乎以王事不可廢敗心傷悲念此也騑騑不止嘽嘽迅疾駱馬強而耐逺隼翩翩能飛之物蓋或飛或下集于所安之處以興使臣之勤勞乃不暇遂其私至不遑將父將事也卒章勸以義也駕而馳驟不息豈不懷歸以王事不可廢敗也是用以此義作歌以告其母父則知義母主恩故以義告之豈不懷歸言使臣之心是用作歌將母來諗作是歌使以此義告其母也皇皇者華天子遣使四方以觀省風俗采察善惡訪問疾苦宣道化于天下下國蒙被聲教是有光華皇皇猶煌煌光采之狀皇華之光明于野猶王澤之流布光華天下也故以為興于彼原隰言高下皆同其光華征夫使人侁侁俊健之狀惟恐不能宣達是每懷靡及也駒騏駱駰皆以俊言濡鮮澤絲條理沃若既均皆整順之狀諏謀詢度前載雖各有義要之詢訪耳採察求訪使臣之大務常棣此燕樂兄弟親睦宗族之詩不因管蔡而作也常棣今所謂玉李花花萼相承甚力故以興兄弟鄂不韡韡韡韡鮮華壯盛之貌不當作拊亦可如字亦可以花萼相依生相親力相承興人之莫如兄弟也次章敘兄弟相賴之事人當死生患難之事可畏則思兄弟之助方困窮離散羣聚于效野之時則求所親以相依恃三章言兄弟相須之急猶鶺鴒首尾相應急難之際其相應如是也每有良朋猶豈無他人每有猶亦有也况也永歎校之則可永歎也骨月不能相為而求他人是可歎也四章重明兄弟之親義不能忘譬之兄弟狠鬩于牆雖有不睦之心猶將外禦其侮若他人則衆人之分也無兵戎之為之義五章言平時則皆可遂其私意急難則莫如兄弟也六章勸其相宴樂養恩義陳爾籩豆飲食飫足兄弟既偕來當和樂且孺也小兒親慕父母謂之孺子孺親慕之義和樂而相親慕也七章言兄弟相樂則妻子好合其和如鼓瑟琴兄弟既志意翕合故其和樂久而不厭卒章言能如是親睦其宗族則能宜其室家樂其妻孥窮究是理圖念是事信其然乎言信然此詩句少而章多章多所以極其鄭重句少則各陳其義故也伐木山中伐木非一人能獨為必與同志者共之既同其事則相親好成朋友之義伐木之人尚有此義況士君子乎故賦伐木之人敘其情推其義以勸朋友之義燕朋友故舊則歌之所以風天下也朋友故舊篤則民德歸厚矣二人伐木更運斧斤聲丁丁相應相須以成其事賦此可以見朋友之義繼言鳥鳴嚶嚶又以物情興朋友之好嚶嚶相應和之和聲鳥鳴相應和自幽谷升喬木相追隨嚶嚶然其鳴蓋其應友聲聲謂應聲猶人之朋友相從也次章因鳥以興朋友之義相鳥如是豈人而不求友乎朋友之信常久不渝可質于鬼神和謂相好平謂不變三章陳伐木共力因相聚飲食見歡樂厚篤之意許許衆人共力之狀因聚衆共力而具飲酒相樂也先儒以藇為美未喻是否伐木之際尚釃酒相樂況既有肥羜當以召諸父也寧其不來無使我恩意不至也諸父諸舅謂朋友故舊也四章陳厚意以具飲食灑掃精潔盛陳簋器況既有肥牡當以召諸舅也寧其不來不可使我有不厚之罪五章重陳此義之不可不然伐木于阪尤須衆力故釃酒之多況乎有盛具籩豆成列當以燕樂兄弟無相疏逺兄弟朋友也民之失德故不能修親睦之道厚朋友故舊之禮乾餱不相及蓋人之失德也豈當然乎卒章陳所當然者有酒則我醑之無酒則我酤之以至鼓舞我為之我及暇時則相與宴飲以篤恩義天保恩惠周物君之下下也歸美于君下之報上也天保之詩盛陳人君受天之祜福祿之厚蒙被臣民猶君德之所致也天保定爾君位甚安固也俾爾單厚何福不除除更新也日益之義俾之多增益莫不繁庶次章重陳其盛既保定爾俾爾享福至無所不宜受天之百祿衆福又降爾以遐逺之福惟欲其長三章言既受天之福祿莫不繁庶如山阜岡陵如川之流聚莫不增盛四章言既享豐盛之福用報祀其祖先得無疆之壽君曰卜爾君使卜之設辭也五章言其所獲神之至謂降監則錫爾多福民所實有則日用飲食謂享其豐樂質實也羣衆百族皆化上德六章言其德光顯無虧庇覆生民恆亦猶升言光照逺廣如南山之無虧崩如松柏之茂盛無不承其庇覆采薇文王之時有昆夷玁狁之事遣戍役以守衛歌此詩以遣之敘其勤勞悲傷之情且風以義當時之事也後世因用之以遣戍役采薇采薇以薇為遣戍役之候也曰歸曰歸深念歸時在嵗暮也作止生出地舍其室家不遑暇起居以玁狁之故也毒民不由上則人懷敵愾之心矣薇始長而柔矣行期將至也念歸期之逺而憂也憂心烈烈如飢如渴戍事未休己念誰使歸問安否薇壯而剛矣且當行也歸期須嵗之陽王事不可盬也故啓處不遑憂心雖甚病我行不可歸也首章述事之由次章三章極道勞苦憂傷之情上能察其情則雖勞而不怨雖憂而能厲四章五章則勸以義彼爾猶云于彼亦與彼路同常棣之華華萼相親興下盡力以為上言當如常棣然也彼路何也乃君子所乘之車也君子則知義矣總強盛之車甲豈敢安居當期成功之速一月而三捷言速五章再言騤騤強盛貌付與之重依依上所處也腓從動之義人之腓身行則從動也腓是足肚也言君子小人從其所處而動也翼翼行列整治之狀既臨其衆則整練其車甲修治其器械弭服是也日為戒備玁狁之事甚急故也先言勞苦憂傷以盡其情次陳之以義以堅其志戍事盡於此矣卒章言歸以憫其勞春而往冬而旋行逺而時久言行道遲遲則見其思歸之切心如飢渴其傷悲甚衆人莫知也此據小序為説于義無害然魚麗序云文武以天保以上治內采薇以下治外于義不然則采薇等二篇或非文王時作乃武王成王文作南仲不知何時人古者戍役再期而還今年春暮行明年夏代者至復留備秋至過十一月而歸又明年中春至春暮遣次戍者每秋與冬初兩畨戍者皆在疆圉乃今之防秋也出車勞將率之旋也此詩所賦自受命至還歸其事有敘大要在歸功將率首章陳出車于牧王命之征赴事之急不敢寧也謂我命我也次章既受命而行有旗章之盛見付與之重憂勞其事也于郊行矣旟旐斾斾華盛斾斾垂委之狀胡不猶莫不其憂念之深僕夫左右之人亦為之意瘁三章指元帥之名以顯其功赫赫德名顯盛襄上也謂勝彭彭衆多央央華盛主言城而勝玁狁禦戎之道守備為本不以攻擊為先其事卒矣四章言其歸敘其久戍也以多難故不遑啓居豈無思歸之心畏法令不敢自遂五章復言出兵而衆和為一方所徯望南仲之功于此為盛草蟲阜螽其類相應民心之望王師猶是也此南仲之伐西戎也觀此詩意疑似當時西戎兵不加而服玁狁兵加而服或止于小大亦不可知卒章喜其歸因敘歸時景物和妍其歡樂可見也訊其魁首當訊問者醜徒衆魚麗美萬物盛多能備禮也太平之時庶物繁盛故能備禮六月序云魚麗廢則法令缺矣物不足則不能備法度也文武以天保以上治內以下傳詩者之言也不可取罶魚笱之易作者麗于罶者亦美大之魚也見其盛多魚與君子之酒皆美且多多且旨同旨且有多止云酒多有有富有之意物多可嘉也有而能備禮也盛有及時也明王在上養育萬物莫不盛多故美之也南山有臺此詩樂君臣俱賢邦家榮盛為福之長也南山興君北山興臣臺萊皆草草之衣被於山成薈萃之美盛猶君子為邦家之基本萬夀無期重言為福長久桑楊充用之物言山生財以濟用興君子為邦家之光榮無疆猶無期杞李可食之物興君子養人如父母德音不已言令聞無窮栲杻木之高者益山之高興君子德音茂盛遐不眉壽猶云不遐逺眉夀乎枸楰木之尤高大者興君子德澤長逺至施及後世故云保艾爾後湛露湛湛厚濃之狀露之濃厚匪日出則不晞興燕樂恩惠之厚不醉則不歸也厭厭足意之義豐草柔從而盛者以興同姓之親在宗載考在同宗成歡樂禮數也杞棘卑下之物興小國諸侯言諸國之君皆明信君子承王惠澤莫不修德以奉上忠順之心溫克之容皆令德也其桐其梓其實離離桐梓高大之木興大國諸侯湛露在桐梓之上二物之茂盛其實離離然言大國之君承王惠澤莫不皆修其令善之儀先親次小後大德澤所懷其序然也離離猶纍纍采芑芑美菜地方壯盛則可植美菜興文武之將甲兵之強則能成茂功簿言發語辭采芑於新田災畝皆地力方盛處方叔所總臨三千乘之衆師干猶今云兵甲試肄習也衆且練也率止往征也言四騏翼翼壯健路車儀飾之盛次章重言之中鄉亦美田旗旐央央言整肅首章言肄習次章言整肅蓋其敘也其行也受服章之尊美言付之重三章言雖將之才士之衆且勇進退得宜趣舍有節言隼之急疾亦集于所止以興兵雖強用之有節而不過也鉦人擊鉦者伐鼓擊鼓者方叔行師有鉦鼓為陳師鞠旅之節鞠止也遂美之言明信之方叔其伐鼓也淵淵平和不暴急其振旅也鼓聲闐闐整緩之狀振旅之行亦以鼓止行則以鉦卒章言成功因言其致伐之由蠢動而無知之義蠢爾之蠻乃與大邦為仇方叔克壯其猶故征而執獲戎車之盛如雷霆方叔之明信自伐玁狁時聞于四方故荆蠻畏威來服車攻文王撫有四方四方一作西方文一作武至是蹙矣故云復文武境土也此詩美其修政事治車甲因田狩而簡車徒諸侯順從軍法肅治如此故能成中興之功先王之政後嗣所當守失則罪也故詩春秋于復古之事不加美辭此詩但稱其復古也吉日則言美矣既攻謂堅治既同謂調一孔阜為肥壯之子猶云二三子指所任者囂囂盛衆貌有繹聨屬決拾不知是一物是二物助射者傾助也射夫衆射者同謂同力如此故獲多助我助斂禽者舉㧘土賣切衆射夫助舉見其多不倚不偏不失持中範也蕭蕭馬鳴悠悠斾旌詠肅靜如此徒御不其警戒乎庖厨不其充盈乎承上言有聞無聲聞師之行而不聞其聲言至肅信哉君子之治戎其成如此之善吉日宣王將田而卜吉日見其慎微詩人因美之更稱其接下得羣下之自盡詩中所陳是也戊剛日之吉既伯既禱祭馬祖而禱之伯為馬祖據爾雅之文戊日祭禱庚午于田漆沮之從天子之所悉率左右以燕天子皆羣下盡力奉上以御賓客且以酌醴先王接下之誠意發小豝殪大兕言所獲耳不須為多説也大兕牛類今西方有之旄牛庭燎天下之事貴乎得中而可常是之謂宜苟以意之所欲而已靡不勤於始而怠于終故其進鋭者其退速宣王之于始也不守法以治盡其力以勤於事固可知其不能于終夙興視朝固有常節始自于夜之未央任其勤而不知節也無節則早晚不能常也故次云未艾向晨也不惟見無常節且知其必將怠矣此所以方美其勤而遂以針之也針之于事如針砭之刺病矣央中也艾向盡也晨曉也將將鸞鈴聲噦噦車軨會聚聲光明之盛晰晰明也輝光之散也白駒刺不能用賢賢者去而不留也皎皎潔白也駒馬之駿者古文千里駒又曰白駒過隙白色之貴者以貴色之駿馬興賢德之才士場圃所食非常苗必美蔬也白駒當食以美物賢才當待以殊禮白駒則維縶之不使去留玩樂以永日唐風云且以永日人暇樂則日永也所謂伊人者宜使於此逍遙豈當使逺去也藿蔬之葉夕猶朝也賢人君子當使于此為嘉賓賁然光彩來思思其賁然而來也上二章言賢者當在朝廷此一章言思其來思其來是不在位也爾公爾侯謂公卿在位者但逸豫無期度不思求賢致治之道乎戒使欽慎優遊無所事之際當勉強思天下之有潛遁之賢者而進用之也三章思賢者之來是不在位也卒章言其逺遁而思之之意逺遁空谷處窮困而享淡薄雖所享生芻一束而已然其人之美則如玉也母金玉爾音而有遐心賢者既逺遁矣國之好賢者猶望其相聞問而不見絶也曰母自貴重其音聲而有逺棄我之心白華幽王寵褒姒而黜申后周人為之作詩以刺王王字誤作后字序自下國化之以下言當時事如此詩中所不及也詩大意刺王專寵失上下之分白華則漚以為菅白茅則用之裹束物之美惡其用各有其所興尊卑上下各有其分今王亂貴賤之序而逺棄我俾我窮獨失所也之子謂王也英英白雲雲之貌天之道雲蒸露降則菅茅皆被其澤王如以道則嫡妾當均被其寵今天運艱難而之子不猶是道也天步時運也猶如也滮池北流小水微流也尚能浸溉稻田王之崇高尊大而反不能通流其寵澤念此所以嘯歌而傷懷也滮池名無源易竭之水樵彼桑薪桑薪之善者樵彼桑薪不用而我烘於煁竈興王之捨嫡后之尊而專寵于嬖人也維彼王之崇大而所為如此所以勞傷我心言之子者直謂是人也言碩人者言其居尊大之位而所為如是也鼓鐘于宫此章自傷其誠意之不能動王也鼓鐘于宫中而聲聞于外今我中心念子慘慘然憂蹙而曽不感動視我邁邁而去邁邁去逺不顧之意鶖之在梁鶴之在林皆其所也今王使我不得其所是以傷心鴛鴦雌者右翼掩左是雌之常也今王為夫之道乃不常二三其德謂初終改易也扁乘石之形設乘石以為髙也而反覆卑興王捨后之尊而寵微賤之人也之子見逺使我困病底病也此詩八章有次序更不煩解第四章中卬字訓我也謂幽王我却烘于煁今俗語如此大雅旱麓言周家承受先祖之業也后稷公劉積德于始世修其業至太王王季重修百福以干天祿申重也人為善而獲福修善乃福也為善而獲福所謂自求多福乃干祿也瞻彼旱麓旱山名麓山足高峻非生物之所麓乃百物所聚生也瞻彼旱麓之榛楛草木得麓之氣濟濟茂盛興此周家之愷悌君子承其祖先愷悌之道所以興盛受福也榛楛旱山所有之木瑟彼玉瓉此章言先祖積德必有善承之子孫也瑟密義謂縝密溫潤之玉瓉其中所盛必黃流也愷悌君子則福祿所降必有賢子孫也瓉圭瓉玉器黃流鬱鬯也鳶飛戾天此章言先祖之德可以作後人也鳶飛至天興上得其道謂先祖魚躍于淵興下得其冝謂後嗣後嗣之賢自先世之貽謀故愷悌君子遐不作人作興起之于善也言不逺作人于善乎清酒既載此章言子孫承受其業致其誠孝之報先祖饗其成功也載事謂造也後人載酒備牲以享祀其先君祖先享報而子孫受福也故云以介景福介至也謂以來大福也瑟彼柞棫瑟然密茂之狀前章言先祖享成功之報此章重明成功由先祖之力柞棫之所以密茂由人焚燎而然今之君子成其王業亦猶神勞力于昔也神指先祖今人種榆亦焚之使茂莫莫葛藟前章言由先祖之為此章重言率循先祖之道莫莫葛藟柔曼茂盛之狀施者謂依緣木之條幹興君子率循先祖之道以干天祿不回謂無邪回他道也此詩所稱愷悌君子或目先祖或謂子孫觀文意可辨皇矣此詩美周家所以興王業故言天監代殷莫若周然此詩主意在美王季終言王業之成而盛述文王之事序因云世世修德莫若文王也皇矣上帝臨下有赫皇大也臨視天下有赫赫威明也下章云王赫斯怒監觀四方求民之莫求民所定也此泛言天祐下民作之君長使得安定也維此二國其政不獲維彼四國爰究爰度惟求民所定故君不善則絶之如彼夏商二國不得其政謂失君道也則于四方之國求謀有德之君使王天下究尋究也度謀度也上帝耆之增其式廓耆致也頌云耆定爾功上帝耆之謂天命所歸式廓謂規限也猶云規模範圍也天命所致則增大其規限自諸侯而升天子由百里而撫四海是增而大之也憎字與增同憎心有所起也義與增同矣乃眷西顧此惟與宅上泛言天道如此上所云求德可安民者大而王之故其眷西顧而歸于周此維與宅謂使其居西土以王天下也作之屏之上章之末言天命歸周此言其居西土所興之業其去惡養善生息其人民皆以養治材木為興作之謂拔之屏之謂去之作屏之者其災其翳也災立死翳自斃意者立死則全枯翳謂枝幹之死耳故災上配作之翳上配屏之作并根出之屏伐去而已夫人之為惡以自亡故以自死之木興之修之平之修治之也叢生曰灌行生曰栵故字以列謂修治其叢列使疏密正直得其宜此興平治民物各得其宜也啓之辟之謂芟除也柳椐柳河栁也椐匱也必芟除而後茂盛此興養民也上四句止言所當去者及行列至此言柳椐乃興民也二木常木衆多者故以興民攘之剔之謂穿剔去其繁冗使成長也檿柘待用之木以興養育賢才也帝遷明德串夷載路上述其治矣此云天監就其明德其治如此串夷載路也串循順之義穿物一貫為串字形亦然夷平也載路猶滿路謂充塞也周家之治順平之道充塞也天立厥配受命既固言天以其德之配天而立之使王則其受命堅固而不易也言天命終歸之必成王業也帝省其山此章將言王季受命配天之事故再言帝省其山以見其所為之可以配天也帝省其山言天視周家之治以山為興也柞棫常木興民松柏良材興賢才拔長盛興生民繁庶兌潤澤興賢才得其所帝作謂天道邦作謂人君之為人君之德能與天對合者自太伯與王季也蓋太伯雖不為人君然其為與王季相須皆周家之事王季之治能對天而由太伯與之固故云自太伯王季也維此王季因心則友又述其事也因心者出其天性也言王季天性友愛其兄故其兄賢之而讓之國卒受天命興王業之篤厚周家之福慶又成其兄讓德之光顯也載辭也錫與也謂與其兄之光顯受天福祿保而不失以至奄有四方奄字之義在忽遂之間此詩本意在美王季故其言泰伯之讓皆由王季下言文王之事亦歸本王季也維此王季帝度其心此章述王季之德帝度其心謂天鑒其衷誠也貊其德音貊字之義疑是大也德音德聲也其德聲既大而其實德克明非徒能明又能類類肖也今人能知而弗克踐之者明及之而行弗類也是非誠有也言王季既明又能類所以為至德長謂能居長上之道君謂能君撫人民興王此大國克順又克俾順謂順道俾化民貽後皆是也夫身不行道不行于妻子已能順道然後能使人王季所以能化民成俗貽厥子孫也故不特俾民遷善而已又俾其子文王守其德而不失故無悔也既受天福祿而能施及于子孫此二句結之而下述文王之事也章謂文王上章之末言王季之業施于子孫此章言文王承王季之緒復受天命終成王業也至文王而有救民征伐之事畔援黨比也畔近岸援攀援歆欲之動也羡愛羡誕與但同義登岸既濟之義天謂文王無黨援以為強無以貪欲而動惟是所先者濟天下于險難此謂順天征伐之道于是密人不恭拒我大邦之命既侵阮而又往將侵共文王赫然而怒整其師旅以遏止密人徂共之師救亂安人以厚周家之福以答天下望周之心也此文王征伐之始也依其在京依憑也京周國文王本據周地以興侵廣土疆自阮而始謂密侵阮文王救安之遂歸復也開地益廣至于岐隴高山皆有之陟我猶云廣我疆宇至登高岡也矢陳也謂墾闢言人無耕闢我陵阜乎陵阜皆我之阿也無飲我水泉乎水泉皆我之池也言皆屬其有也其地既廣于是擇高明之處而安居之度相其鮮原鮮原謂高明之地得其地于岐山之南渭水之傍將猶傍也謂其傍建其都邑其德為萬國所歸向是天下萬民之王也帝謂文王豫懷明德上章言文王開拓土宇天下歸服此章乃言其聖德所以化人如此帝謂文王豫懷爾之明德不大其聲色而人化夫聖人之誠感無不通故所過者化所存者神豈暴著于形迹也哉是不發見其大聲色也故聖人曰聲色之于化民末也其化之感人雖不大其聲色而其應之疾人之惡不及長大而革也夏大也言不待遲久而化也民由之而不知日遷善而不知為之者是不識不知而順夫天理也此聖人之神化非文王孰能及之帝謂文王詢爾仇方此章首言文王之化如此章末言聖人之化如此而天下有昏惡之甚不能化者伐而誅之則天下皆善而王業成帝謂文王當謀與爾為仇之方詢謀也同爾兄弟之國以爾攻伐之具以伐為仇之崇鉤援登城之梯臨衝二車皆兵車臨衝間間此章述伐崇而天下畏服也間間徐緩之狀言言猶斷斷也校訟不服之狀凡聖人之伐未有不俟其革心順服者既不服然後攻之崇侯迷惡當文王之徐緩之時則斷斷不服故文王遂加之兵執訊連連之多連連屬續之狀訊生獲者也安安不輕暴也馘斬獲也聖人之伐殺其犯順者非輕肆殺戮也故于馘也安安然審重又為類禡之祭古者出征類于上帝禡于所征之地所以暴明其罪告之神明言其當誅伐伐而告之神明其伐合神明之道也又明其罪惡以著逆順之理是可致所不服而來附其人也于是四方畏服莫敢侮慢伐而猶不服于是力攻之茀茀盛強之狀既力攻之崇乃仡仡然仡仡壯勇之狀堅拒守是其惡之終不革者也于是攻伐之肆謂縱攻也絶滅之忽滅也天誅既行四方畏服無敢違拂者矣文王之征始于密王功之始也終于崇天下遂無不服王功之成也文王有聲言作豐在伐崇之後而此言度居乃在前章者蓋此章自侵自阮疆言其廣疆宇以至于及逺建都邑一併盡言之耳非謂事在伐崇前也程氏經説卷三
